# Logical model-port roles — physical endpoint is the swap seam
# Each role maps to an OpenAI-compatible endpoint or the claude-cli teacher adapter.
# dev = Ollama (this box, :11434); prod mlx config (:8040) is regenerated at Mini bring-up (M0-c).

[responder]
endpoint = "http://127.0.0.1:11434/v1"      # dev: Ollama (this box)
model_id = "qwen3:4b"                        # verify exact tag at `ollama pull` (see DEV-MODEL-STACK.md)
adapter = "openai"
# prod (M0-c, Mac): http://127.0.0.1:8040/v1  model_id = Qwen3-4B-Instruct-2507

[teacher]
endpoint = "claude-cli"                     # claude CLI teacher adapter
model_id = "claude-opus"
adapter = "claude-cli"

[embedder]
endpoint = "http://127.0.0.1:11434/v1"      # dev: Ollama (this box)
model_id = "qwen3-embedding:0.6b"            # 1024-dim; verify exact tag at `ollama pull`
adapter = "openai"
# prod (M0-c, Mac): http://127.0.0.1:8040/v1  model_id = Qwen3-Embedding-0.6B

[reranker]
endpoint = "http://127.0.0.1:11434/v1"      # dev: Ollama (this box)
model_id = "qwen3-reranker:0.6b"             # verify exact tag at `ollama pull`
adapter = "openai"
# prod (M0-c, Mac): http://127.0.0.1:8040/v1  model_id = Qwen3-Reranker-0.6B

[sensitive_reasoner]
endpoint = "http://127.0.0.1:8040/v1"       # local mlx-openai-server, lazy
model_id = "Qwen3.6-27B"
adapter = "openai"

[responder_cloud]
endpoint = "codex"           # logical role - Codex uses the CLI/subscription, not an HTTP endpoint
model_id = "gpt-5.4"         # informational; CodexModelPort uses settings.codex_model (per-role cloud model is a follow-up)
adapter = "codex"

[sensitivity_classifier]
endpoint = "http://127.0.0.1:8040/v1"   # MUST stay loopback (privacy gate enforces this) -- keep in sync with mlx_port
model_id = "Qwen3-4B-Instruct-2507"     # reuses the small local instruct model (no extra resident model)
adapter = "openai"

# logical role — physical endpoint is the swap seam
[research_reader]
endpoint = "http://127.0.0.1:8040/v1" # prod mlx; dev reuses local
model_id = "Qwen3-4B-Instruct-2507"
adapter = "openai"

# logical role — physical endpoint is the swap seam
[research_orchestrator_standard]
endpoint = "https://api.deepseek.com/v1"
model_id = "deepseek-chat"
adapter = "openai"
api_key = { env = "DEEPSEEK_API_KEY" }

# logical role — physical endpoint is the swap seam
[research_orchestrator_deep]
endpoint = "claude-cli"
model_id = "claude-opus"
adapter = "claude-cli"
