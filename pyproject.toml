[project]
name = "artemis"
version = "0.1.0"
description = "Artemis — personal assistant core"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "pydantic-settings>=2",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "tzdata>=2026.2",
    "sqlite-vec>=0.1",
    "lancedb>=0.33.0",
    "google-auth>=2.55.0",
    "google-auth-oauthlib>=1.4.0",
    "google-api-python-client>=2.197.0",
    "tldextract>=5.3.1",
    "cryptography>=49.0.0",
    "trafilatura>=2.1.0",
]

[project.scripts]
artemis-google-auth = "artemis.integrations.google.cli:main"
artemis-dev-email-rules = "artemis.dev.email_rules:main"

[dependency-groups]
dev = [
    "mypy>=1.15",
    "pytest>=8",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
    "anyio>=4",
]
# Heavy torch-scale parser — NOT installed by plain `uv sync` (dev box stays lean,
# M3-a runs against FakeParser). Install on Mac/prod with `uv sync --group docling`.
docling = [
    "docling>=2.99.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artemis"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
files = ["src", "tests"]
exclude = [
    ".venv/",
    "scripts/",
]

[[tool.mypy.overrides]]
module = "lancedb"
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]  # let formatter handle line length
