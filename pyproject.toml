[project]
name = "artemis"
version = "0.1.0"
description = "Artemis — personal assistant core"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2",
    "pydantic-settings>=2",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "tzdata>=2026.2",
    "sqlite-vec>=0.1",
    "lancedb>=0.33.0",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.15",
    "pytest>=8",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
    "anyio>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/artemis"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
files = ["src", "tests"]
exclude = [
    ".venv/",
    "scripts/",
]

[[tool.mypy.overrides]]
module = "lancedb"
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]  # let formatter handle line length
