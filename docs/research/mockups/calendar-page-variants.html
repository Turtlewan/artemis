<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artemis — Calendar page variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* register ambient tokens as typed colours so they interpolate (smooth cross-fade) */
  @property --bg{syntax:"<color>";inherits:true;initial-value:#060c14}
  @property --p{syntax:"<color>";inherits:true;initial-value:#58c6ff}
  @property --a{syntax:"<color>";inherits:true;initial-value:#fff0d8}
  :root{
    --bg:#060c14; --p:#58c6ff; --a:#fff0d8;                 /* ambient — set by the resolver (default Winter·afternoon) */
    --ok:#67e0a3; --text:#eef7ff; --muted:#a8bccb;
    --glass:color-mix(in srgb,var(--bg) 33%,transparent); --glass2:color-mix(in srgb,var(--bg) 19%,transparent);
    --hair:color-mix(in srgb,var(--p) 22%,transparent);
    font-synthesis:none;
    transition:--bg .8s cubic-bezier(.4,0,.2,1),--p .8s cubic-bezier(.4,0,.2,1),--a .8s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{color:var(--text);font-family:'Inter',system-ui,'Segoe UI',sans-serif;height:100%;background:var(--bg)}
  .bg{position:fixed;inset:-40px;z-index:0;background-size:cover;background-position:center;filter:brightness(.66) saturate(1.08) blur(1.5px);transition:opacity .8s ease}
  .bg-grad{position:fixed;inset:0;z-index:5;pointer-events:none;background:
    radial-gradient(1200px 820px at 50% -8%, rgba(40,90,120,.16), transparent 60%),
    linear-gradient(180deg, rgba(7,13,22,.20), rgba(7,13,22,.46) 72%, rgba(7,13,22,.62))}
  .app{position:fixed;inset:0;z-index:6}

  /* top bar (ambient toggle lives here) */
  .top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:13px;padding:13px 20px;z-index:50}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:23px;height:23px;filter:drop-shadow(0 0 6px var(--p))}
  .brand b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.2em;font-size:12.5px}
  .crumb{font-family:'Space Grotesk';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding-left:13px;border-left:1px solid var(--hair)}
  .crumb b{color:var(--p);font-weight:500}
  .top .sp{flex:1}
  .ghost{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);backdrop-filter:blur(8px);transition:.16s}
  .ghost:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .ghost svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}
  .amb-pop{position:absolute;top:50px;right:20px;width:344px;z-index:60;padding:13px;border-radius:16px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 60%,transparent),color-mix(in srgb,var(--bg) 44%,transparent));
    backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05),inset 0 0 26px -6px color-mix(in srgb,var(--p) 18%,transparent),0 2px 6px -2px rgba(0,0,0,.4),0 32px 80px -28px #000,0 0 40px -16px var(--p);opacity:0;transform:translateY(-8px);pointer-events:none;transition:.2s}
  .amb-pop.on{opacity:1;transform:none;pointer-events:auto}
  .amb-pop-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .amb-pop-head b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.16em;font-size:11px;text-transform:uppercase}
  .amb-pop-head .sub{font-size:10px;color:var(--muted)}
  .amb-pop-head #ambAuto{margin-left:auto;font-family:'Space Grotesk';font-size:10.5px;color:#eaf7ff;border:1px solid color-mix(in srgb,var(--p) 38%,transparent);border-radius:7px;padding:4px 9px;cursor:pointer;background:color-mix(in srgb,var(--p) 14%,transparent)}
  .amb-pop-head #ambAuto:hover{background:color-mix(in srgb,var(--p) 24%,transparent)}
  .amb-grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:5px;align-items:center}
  .amb-h{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center}
  .amb-rh{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);padding-right:5px;text-align:right}
  .amb-cell{position:relative;height:30px;border-radius:8px;border:1px solid var(--hair);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden;transition:.14s}
  .amb-cell:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--p) 45%,transparent)}
  .amb-cell.draft{border-style:dashed;opacity:.85}
  .amb-cell i{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px -1px rgba(0,0,0,.6)}
  .amb-cell.act{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 16px -4px var(--p)}
  .amb-note{margin-top:11px;font-size:10px;line-height:1.45;color:var(--muted)}
  .stat{display:flex;align-items:center;gap:11px}
  .s{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 7px var(--p)}
  .dot.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}

  /* ---------- variant switcher (top-center pill row) ---------- */
  .vswitch{position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:55;display:flex;flex-wrap:wrap;justify-content:center;gap:5px;max-width:92vw;padding:5px 7px;border-radius:13px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 56%,transparent),color-mix(in srgb,var(--bg) 40%,transparent));
    backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(255,255,255,.05),inset 0 0 22px -6px color-mix(in srgb,var(--p) 18%,transparent),0 2px 6px -2px rgba(0,0,0,.4),0 22px 56px -30px #000}
  .vswitch button{font-family:'Space Grotesk';font-size:10.5px;color:#cfe1ee;border:1px solid transparent;border-radius:8px;padding:5px 10px;cursor:pointer;background:transparent;transition:.15s;white-space:nowrap}
  .vswitch button:hover{background:color-mix(in srgb,var(--p) 10%,transparent)}
  .vswitch button.on{color:#eaf7ff;border-color:color-mix(in srgb,var(--p) 40%,transparent);background:color-mix(in srgb,var(--p) 18%,transparent);box-shadow:0 0 16px -7px var(--p)}

  /* ---------- the opened Calendar detail panel ---------- */
  .dov-scrim{position:fixed;inset:0;z-index:44;background:rgba(3,7,13,.20)}
  .dov{position:fixed;z-index:45;left:50%;top:58%;transform:translate(-50%,-50%);
    width:880px;max-width:94vw;height:600px;max-height:80vh;
    display:flex;flex-direction:column;border-radius:18px;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 46%,transparent),color-mix(in srgb,var(--bg) 32%,transparent));
    backdrop-filter:blur(32px) saturate(150%);-webkit-backdrop-filter:blur(32px) saturate(150%);
    border:1px solid color-mix(in srgb,var(--p) 34%,transparent);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.24),inset 0 -1px 0 rgba(255,255,255,.06),inset 0 0 40px -10px color-mix(in srgb,var(--p) 16%,transparent),0 4px 12px -3px rgba(0,0,0,.5),0 50px 130px -28px #000,0 0 64px -16px var(--p);
    transition:width .5s cubic-bezier(.2,.85,.25,1),height .5s cubic-bezier(.2,.85,.25,1)}
  .dov.roomy{width:1060px;height:680px}
  .dov.compact{width:760px;height:540px}
  .dov::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.32;background:linear-gradient(162deg,rgba(255,255,255,.12),transparent 30%);mix-blend-mode:screen}

  /* header row */
  .chrome{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--hair);position:relative;z-index:2;flex:0 0 auto}
  .chrome .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-size:16px;background:color-mix(in srgb,var(--p) 12%,transparent);border:1px solid color-mix(in srgb,var(--p) 22%,transparent)}
  .chrome h3{font-family:'Space Grotesk';font-weight:500;font-size:16px;letter-spacing:.01em}
  .chrome .vname{font-family:'Space Grotesk';font-size:10px;color:var(--muted);letter-spacing:.04em;margin-top:1px}
  .chrome .sp{flex:1}
  .seg{display:flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden;background:rgba(8,14,22,.35)}
  .seg button{font-family:'Space Grotesk';font-size:11.5px;color:#cfe1ee;padding:6px 13px;cursor:pointer;border:0;background:transparent;transition:.15s}
  .seg button:hover{background:color-mix(in srgb,var(--p) 10%,transparent)}
  .seg button.on{color:#eaf7ff;background:color-mix(in srgb,var(--p) 20%,transparent);box-shadow:0 0 14px -6px var(--p) inset}
  .pill{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);transition:.16s}
  .pill:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .pill.accent{border-color:color-mix(in srgb,var(--p) 42%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 15%,transparent);box-shadow:0 0 18px -8px var(--p)}
  .pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
  .x{width:26px;height:26px;display:grid;place-items:center;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;flex:0 0 auto}
  .x:hover{background:rgba(255,255,255,.08);color:var(--text)}

  /* body shell — flex panes; a variant decides the split */
  .panes{flex:1;display:flex;min-height:0;position:relative;z-index:2;overflow:hidden}
  .main{min-width:0;padding:14px 14px 14px 16px;display:flex;flex-direction:column;flex:1 1 62%}
  .side{min-width:0;padding:14px 16px;overflow:auto;display:flex;flex-direction:column;flex:0 0 38%;border-left:1px solid var(--hair)}
  .panes.full .main{flex:1 1 100%}
  .panes.full .side{display:none}
  .panes.agenda .main{flex:0 0 38%}                 /* agenda-primary: mini-month is the narrow rail */
  .panes.agenda .side{flex:1 1 62%;border-left:1px solid var(--hair)}
  .panes.roomy .main{padding:20px 18px 20px 22px}
  .panes.roomy .side{flex:0 0 36%;padding:20px}
  .panes.compact .main{padding:10px 10px 10px 12px}
  .panes.compact .side{flex:0 0 36%;padding:10px 12px}
  .panes.slim .side{flex:0 0 32%}

  /* split-stack inside .main (month over week) */
  .stack{flex:1;display:flex;flex-direction:column;min-height:0;gap:10px}
  .stack .half{flex:1;min-height:0;display:flex;flex-direction:column}
  .stack .lbl{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}

  /* ---- month title + dow header (shared) ---- */
  .mtitle{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .mtitle b{font-family:'Space Grotesk';font-weight:500;font-size:14px}
  .mtitle .sp{flex:1}
  .panes.roomy .mtitle b{font-size:16px}
  .nav{width:22px;height:22px;display:grid;place-items:center;border-radius:6px;border:1px solid var(--hair);cursor:pointer;color:var(--muted);font-size:12px}
  .nav:hover{color:var(--text);background:rgba(255,255,255,.06)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
  .dow span{font-family:'Space Grotesk';font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center}
  .dow span.we{opacity:.5}

  /* shared month grid scaffold + default cells */
  .grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:5px;min-height:0}
  .cell{position:relative;border:1px solid var(--hair);border-radius:9px;padding:5px 6px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;gap:3px;background:rgba(120,180,255,.025);transition:.14s}
  .cell:hover{border-color:color-mix(in srgb,var(--p) 40%,transparent);background:color-mix(in srgb,var(--p) 7%,transparent)}
  .cell.we{opacity:.52}.cell.out{opacity:.28}
  .cell.today{background:color-mix(in srgb,var(--p) 12%,transparent);border-color:color-mix(in srgb,var(--p) 34%,transparent)}
  .cell.sel{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 18px -6px var(--p)}
  .cell .dn{font-family:'Space Grotesk';font-size:12px;color:#dceaf4;display:flex;align-items:center;gap:4px}
  .cell.today .dn{color:#fff;font-weight:500}
  .cell .tk{margin-left:auto;width:14px;height:14px;border-radius:4px;display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--a) 40%,transparent);color:var(--a)}
  .cell .tk svg{width:9px;height:9px;stroke:var(--a);fill:none;stroke-width:2.4}
  .chip{font-size:9.5px;line-height:1.25;border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:#eaf3fb;background:color-mix(in srgb,var(--p) 18%,transparent);border:1px solid color-mix(in srgb,var(--p) 30%,transparent)}
  .chip.tent{color:#fff;background:color-mix(in srgb,var(--a) 10%,transparent);border:1px dashed color-mix(in srgb,var(--a) 55%,transparent)}
  .chip.more{background:transparent;border:0;color:var(--muted);font-family:'Space Grotesk';font-size:9px;padding:0 2px}
  .grid.roomy{gap:8px}.grid.roomy .cell{padding:8px 9px;gap:4px}.grid.roomy .cell .dn{font-size:13.5px}.grid.roomy .chip{font-size:10.5px;padding:3px 7px}
  .grid.compact{gap:3px}.grid.compact .cell{padding:3px 5px;border-radius:7px;gap:2px}.grid.compact .cell .dn{font-size:11px}.grid.compact .chip{font-size:9px;padding:1px 4px}

  /* DOTS month treatment (from calendar-month-variations) */
  .grid.dots{gap:6px}
  .grid.dots .cell{align-items:center;gap:7px;padding:8px 8px 7px;border-radius:11px}
  .grid.dots .num{font-family:'Space Grotesk';font-size:14px;color:#dceaf4;width:26px;height:26px;display:grid;place-items:center;border-radius:50%}
  .grid.dots .cell.today .num{background:var(--p);color:#0a121c;box-shadow:0 0 12px -2px var(--p)}
  .grid.dots .dots{display:flex;align-items:center;gap:4px;min-height:8px}
  .grid.dots .ed{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 6px -1px var(--p)}
  .grid.dots .ed.tent{background:transparent;border:1px dashed var(--a);box-shadow:none}
  .grid.dots .ed.task{background:var(--a);box-shadow:0 0 5px -1px var(--a);width:5px;height:5px}
  .grid.dots .plus{font-family:'Space Grotesk';font-size:8.5px;color:var(--muted);margin-left:1px}

  /* EDITORIAL month treatment */
  .grid.edi{gap:0}
  .grid.edi .cell{border:0;border-radius:0;background:transparent;padding:8px 9px 6px;gap:5px;
    border-top:1px solid color-mix(in srgb,var(--hair) 28%,transparent);border-left:1px solid color-mix(in srgb,var(--hair) 16%,transparent)}
  .grid.edi .cell:nth-child(7n+1){border-left:0}
  .grid.edi .cell:hover{background:color-mix(in srgb,var(--p) 5%,transparent)}
  .grid.edi .cell.we{opacity:.42}.grid.edi .cell.out{opacity:.2}
  .grid.edi .cell.sel{background:color-mix(in srgb,var(--p) 8%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--p) 45%,transparent)}
  .grid.edi .num2{font-family:'Space Grotesk';font-size:13px;color:#cfe0ee}
  .grid.edi .cell.today .num2{color:var(--bg);background:var(--p);border-radius:50%;width:22px;height:22px;display:inline-grid;place-items:center}
  .grid.edi .bar{display:flex;align-items:center;gap:6px;font-size:10px;color:#cfe0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grid.edi .bar i{width:13px;height:2.5px;border-radius:2px;flex:0 0 auto;background:var(--p)}
  .grid.edi .bar.tent i{background:transparent;border-top:2px dashed var(--a);height:0}
  .grid.edi .bar.tent{color:#fff}
  .grid.edi .bar.task i{background:var(--a)}
  .grid.edi .plus{font-size:9px;color:var(--muted)}

  /* mini-month (agenda-primary navigator) */
  .mini-m{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .mini-m .mc{position:relative;aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk';font-size:10.5px;color:#cfe0ee;cursor:pointer;border:1px solid transparent;transition:.12s}
  .mini-m .mc:hover{background:color-mix(in srgb,var(--p) 9%,transparent)}
  .mini-m .mc.we{opacity:.5}.mini-m .mc.out{opacity:.25}
  .mini-m .mc.today{background:color-mix(in srgb,var(--p) 16%,transparent);color:#fff}
  .mini-m .mc.sel{border-color:#fff;box-shadow:0 0 0 1px var(--p)}
  .mini-m .mc .pip{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--p);box-shadow:0 0 5px -1px var(--p)}
  .mini-m .mc .pip.t{background:transparent;border:1px solid var(--a)}
  .mini-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
  .mini-dow span{font-family:'Space Grotesk';font-size:8px;color:var(--muted);text-align:center}

  /* ---- WEEK view (time-axis) ---- */
  .week{flex:1;display:flex;flex-direction:column;min-height:0}
  .wkhead{display:grid;grid-template-columns:38px repeat(7,1fr);gap:0;margin-bottom:4px}
  .wkhead .wd{text-align:center;font-family:'Space Grotesk';font-size:10px;color:var(--muted);padding:2px 0;border-radius:6px;cursor:pointer}
  .wkhead .wd.we{opacity:.5}
  .wkhead .wd.today{color:#fff;background:color-mix(in srgb,var(--p) 16%,transparent)}
  .wkhead .wd.sel{box-shadow:0 0 0 1px var(--p) inset;border-radius:6px}
  .wkhead .wd b{font-family:'Space Grotesk';font-weight:500;font-size:14px;color:#dceaf4;display:block}
  .wkallday{display:grid;grid-template-columns:38px repeat(7,1fr);gap:0;margin-bottom:3px}
  .wkallday .albl{font-family:'Space Grotesk';font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;align-self:center;text-align:right;padding-right:5px}
  .wkallday .col{padding:0 2px;min-height:16px;display:flex;flex-direction:column;gap:2px}
  .allchip{font-size:8.5px;line-height:1.2;border-radius:4px;padding:1px 4px;color:var(--a);border:1px solid color-mix(in srgb,var(--a) 40%,transparent);background:color-mix(in srgb,var(--a) 9%,transparent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wkbody{flex:1;display:grid;grid-template-columns:38px repeat(7,1fr);gap:0;position:relative;overflow:auto;min-height:0;border-top:1px solid var(--hair)}
  .axis{position:relative}
  .axis .hr{position:absolute;left:0;right:2px;text-align:right;font-family:'Space Grotesk';font-size:8.5px;color:var(--muted);transform:translateY(-5px);padding-right:4px}
  .wcol{position:relative;border-left:1px solid color-mix(in srgb,var(--hair) 60%,transparent)}
  .wcol.we{background:rgba(0,0,0,.12)}.wcol.today{background:color-mix(in srgb,var(--p) 5%,transparent)}
  .gl{position:absolute;left:0;right:0;border-top:1px dashed color-mix(in srgb,var(--hair) 45%,transparent)}
  .evt{position:absolute;left:3px;right:3px;border-radius:6px;padding:2px 5px;font-size:9px;line-height:1.2;overflow:hidden;
    color:#eaf3fb;background:color-mix(in srgb,var(--p) 22%,transparent);border:1px solid color-mix(in srgb,var(--p) 34%,transparent)}
  .evt b{font-family:'Space Grotesk';font-weight:500;font-size:8.5px;display:block;opacity:.8}
  .evt.tent{color:#fff;background:color-mix(in srgb,var(--a) 9%,transparent);border:1px dashed color-mix(in srgb,var(--a) 55%,transparent)}
  .week.mini .wkhead .wd b{font-size:12px}.week.mini .axis .hr{font-size:8px}

  /* week strip (split bottom half — compact 7-col mini agenda) */
  .wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex:1;min-height:0}
  .wstrip .wsc{border:1px solid var(--hair);border-radius:8px;padding:5px;display:flex;flex-direction:column;gap:3px;overflow:hidden;cursor:pointer;background:rgba(120,180,255,.025)}
  .wstrip .wsc.we{opacity:.55}.wstrip .wsc.today{border-color:color-mix(in srgb,var(--p) 34%,transparent);background:color-mix(in srgb,var(--p) 10%,transparent)}
  .wstrip .wsc.sel{border-color:#fff;box-shadow:0 0 0 1px var(--p)}

  /* ---- dashboard widgets (right rail) ---- */

  .wtile .wt{font-family:'Space Grotesk';font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .wtile .big{font-family:'Space Grotesk';font-weight:500;font-size:22px;color:#eaf7ff}

  /* ---- selected-day agenda (shared) ---- */
  .sidehead{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}

  .sidesub{font-size:11px;color:var(--muted);margin-bottom:12px}
  .eyebrow{font-family:'Space Grotesk';font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:12px 0 7px}
  .eyebrow:first-of-type{margin-top:2px}
  .ev{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--hair);font-size:13px}
  .ev:first-of-type{border-top:0}
  .ev .tm{font-family:'Space Grotesk';font-size:11.5px;color:var(--muted);flex:0 0 42px;padding-top:1px}
  .ev .body{flex:1;min-width:0}
  .ev .ti{color:#e7f1fa}
  .ev small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
  .ev.tent{border-left:2px dashed color-mix(in srgb,var(--a) 60%,transparent);padding-left:9px;margin-left:-2px;border-radius:0 8px 8px 0;background:color-mix(in srgb,var(--a) 5%,transparent)}
  .ev.tent .ti{color:#fff}
  .approve{display:flex;gap:7px;margin-top:7px}
  .mini-btn{font-family:'Space Grotesk';font-size:10.5px;border-radius:7px;padding:4px 10px;cursor:pointer;border:1px solid var(--hair);color:#cfe1ee;background:transparent;transition:.15s}
  .mini-btn:hover{background:rgba(255,255,255,.06)}
  .mini-btn.primary{border-color:color-mix(in srgb,var(--a) 50%,transparent);color:#fff;background:color-mix(in srgb,var(--a) 14%,transparent)}
  .mini-btn.primary:hover{background:color-mix(in srgb,var(--a) 24%,transparent)}
  .tag{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:2px 8px;white-space:nowrap;align-self:flex-start;margin-top:2px}
  .tag.a{color:var(--a);border-color:color-mix(in srgb,var(--a) 38%,transparent)}
  .tag.held{color:var(--a);border:1px dashed color-mix(in srgb,var(--a) 45%,transparent)}
  .task{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--hair);font-size:13px}
  .task:first-of-type{border-top:0}
  .chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--hair);flex:0 0 auto;display:grid;place-items:center;margin-top:1px;cursor:pointer}
  .chk svg{width:11px;height:11px;stroke:var(--ok);fill:none;stroke-width:2.4;opacity:0}
  .chk.on{border-color:color-mix(in srgb,var(--ok) 50%,transparent)}.chk.on svg{opacity:1}
  .task .body{flex:1;min-width:0}
  .rsvp{border:1px solid var(--hair);border-radius:11px;padding:11px;margin-top:4px;background:color-mix(in srgb,var(--p) 6%,transparent)}
  .rsvp h4{font-size:13px;font-weight:600;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .rsvp .why{color:#bcd0de;font-size:11.5px;line-height:1.4;margin-top:5px}
  .rsvp .acts{display:flex;justify-content:flex-end;gap:8px;margin-top:9px}
  .chip-act{font-family:'Space Grotesk';font-size:10.5px;border-radius:7px;padding:5px 12px;cursor:pointer;border:1px solid color-mix(in srgb,var(--p) 45%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 16%,transparent)}
  .chip-act:hover{background:color-mix(in srgb,var(--p) 26%,transparent)}
  .addev{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:12px;color:var(--muted);font-family:'Space Grotesk';font-size:12px;cursor:pointer}
  .addev:hover{color:#cfe1ee}
  .addev .pl{width:20px;height:20px;border-radius:6px;border:1px solid var(--hair);display:grid;place-items:center;font-size:13px}
  .empty{color:var(--muted);font-size:12px;padding:6px 0;font-style:italic}

  /* slide-over agenda (grid-full variant) */
  .slideover{position:absolute;top:0;right:0;bottom:0;width:344px;max-width:64%;z-index:6;padding:16px 18px;overflow:auto;display:flex;flex-direction:column;
    background:linear-gradient(200deg,color-mix(in srgb,var(--bg) 62%,transparent),color-mix(in srgb,var(--bg) 48%,transparent));
    backdrop-filter:blur(34px) saturate(150%);-webkit-backdrop-filter:blur(34px) saturate(150%);border-left:1px solid color-mix(in srgb,var(--p) 30%,transparent);
    box-shadow:-30px 0 70px -30px #000,inset 1px 0 0 rgba(255,255,255,.08);
    transform:translateX(100%);opacity:0;pointer-events:none;transition:transform .42s cubic-bezier(.2,.85,.25,1),opacity .3s ease}
  .slideover.on{transform:none;opacity:1;pointer-events:auto}
  .slideover .so-x{position:absolute;top:12px;right:12px}

  @media (prefers-reduced-motion:reduce){:root{transition:none!important}.bg{transition:none!important}.amb-pop{transition:none!important}
    .dov{transition:none!important}.slideover{transition:none!important}}
</style>

<body>
<div class="bg" id="bg"></div>
<div class="bg" id="bg2" style="opacity:0"></div>
<div class="bg-grad"></div>

<div class="app" id="app">

    <div class="stat"><span class="s"><span class="dot"></span> <span id="ambLabel">Winter·afternoon</span></span><span class="s"><span class="dot ok"></span> Connected</span></div>

  </div>

  <!-- top-center variant switcher -->
  <div class="vswitch" id="vswitch"></div>

      <button class="pill accent" title="Artemis proposes a slot — held tentative until you approve"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg> find time</button>
      <div class="x" title="Back to map">✕</div>
    </div>
    <div class="panes" id="panes">
      <div class="main" id="mainPane"></div>
      <div class="side" id="sidePane"></div>
    </div>
  </div>
</div>

<script>
/* ====================================================================
   Calendar PAGE variants — standalone. Today = Tue 23 Jun 2026.
   Each variant is a full calendar detail page; the top pill row flips
   layout/structure + density live. Engine truths (same as
   calendar-detail.html):
     - self-only edits act inline (+ add event)
     - external-effect (RSVP/invite) → `review` tag, stages to Review
     - tentatives HELD in Artemis until approved; approving writes to Google
     - tasks shown here come from the Tasks module (due-on-day link)
   ==================================================================== */
const YEAR=2026, MONTH=5;                 // June (0-based)
const TODAY={y:2026,m:5,d:23};            // Tue 23 Jun 2026
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const key=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
function dow(y,m,d){return (new Date(y,m,d).getDay()+6)%7;}   // 0=Mon … 6=Sun
const isWE=i=>i>=5;

/* ---------- sample data (verbatim from calendar-detail.html) ---------- */
const EVENTS={
  '2026-06-23':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:12,e:13,t:'Lunch — Ashley'},
                 {type:'tent',s:14,e:15.5,t:'Focus block',sub:'proposed by Artemis · 90m'},
                 {type:'task',t:'Reply to landlord',sub:'rented flat'},
                 {type:'rsvp',s:16.5,e:17,t:'Team sync invite',sub:'from Debby · respond'} ],
  '2026-06-24':[ {type:'ev',s:10,e:11,t:'1:1 — Debby'},
                 {type:'tent',s:15,e:16,t:'Interview — candidate',sub:'tentative · awaiting confirm'} ],
  '2026-06-25':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:13,e:14,t:'Design review'} ],
  '2026-06-26':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'task',t:'Pay SP Group bill',sub:'S$84.20 · due Fri'},
                 {type:'task',t:'Call dentist'} ],
  '2026-06-29':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'tent',s:14,e:15.5,t:'Focus block',sub:'proposed · weekly'} ],
  '2026-06-30':[ {type:'ev',s:11,e:12,t:'Quarter wrap'},
                 {type:'task',t:'Draft Q3 review'} ],
  '2026-07-01':[ {type:'ev',s:9.5,e:10,t:'Standup'} ],
  '2026-07-02':[ {type:'task',t:'Book Penang flights',sub:'compare Fri eve vs Sat am'} ],
  '2026-07-03':[ {type:'ev',s:12,e:13,t:'Lunch — Ashley'} ],
  '2026-07-06':[ {type:'ev',s:9.5,e:10,t:'Standup'} ],
  '2026-07-08':[ {type:'ev',s:10,e:11,t:'1:1 — Debby'} ],
  '2026-07-10':[ {type:'task',t:'Confirm Penang hotel'} ],
  '2026-07-12':[ {type:'ev',s:18,e:20,t:'Fly to Penang',sub:'with Ashley'} ],
  '2026-07-13':[ {type:'ev',s:16,e:19,t:'Penang weekend',sub:'return Sun eve'} ],
  '2026-06-18':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:14,e:15,t:'Catch-up — Mum'} ],
  '2026-06-19':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'task',t:'Renew domain'} ]
};
function dayItems(k){return EVENTS[k]||[];}
const fmtH=h=>{const hr=Math.floor(h),mn=Math.round((h-hr)*60);return `${hr}:${String(mn).padStart(2,'0')}`;};

/* ---------- variant registry ---------- */
const VARIANTS=[
  {id:'classic', name:'Classic — month + day-panel'},
  {id:'week',    name:'Week-axis primary'},
  {id:'agenda',  name:'Agenda-primary + mini-month'},
  {id:'gridfull',name:'Grid full-width + slide-over'},
  {id:'split',   name:'Split month / week'},
  {id:'compact', name:'Compact'},
  {id:'roomy',   name:'Roomy'},
  {id:'editorial',name:'Editorial (low-chrome)'},
  {id:'dashboard',name:'Dashboard widgets'},
  {id:'dots',    name:'Dots (airy)'}
];
let variant='classic';
let view='month';                  // Month/Week toggle (some variants force one)
let sel={...TODAY};

/* ---------- shared helpers ---------- */
function gridFrame(){
  const first=dow(YEAR,MONTH,1);
  const start=new Date(YEAR,MONTH,1-first);
  const last=new Date(YEAR,MONTH+1,0).getDate();
  return {start,rowsN:Math.ceil((first+last)/7)};
}
function cellMeta(i,start){
  const dt=new Date(start); dt.setDate(start.getDate()+i);
  const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
  return {y,m,d,col:i%7,k:key(y,m,d),out:(m!==MONTH),
    today:(y===TODAY.y&&m===TODAY.m&&d===TODAY.d),
    seld:(y===sel.y&&m===sel.m&&d===sel.d)};
}
function clsFor(M,extra){return ['cell',isWE(M.col)?'we':'',M.out?'out':'',M.today?'today':'',M.seld?'sel':'',extra||''].filter(Boolean).join(' ');}
function monthTitleHTML(){
  return `<div class="mtitle"><div class="nav">‹</div><b>${MON[MONTH]} ${YEAR}</b><div class="nav">›</div><div class="sp"></div></div>
    <div class="dow">${WD.map((w,i)=>`<span class="${isWE(i)?'we':''}">${w}</span>`).join('')}</div>`;
}
function tkBadge(has){return has?`<span class="tk" title="task due"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></span>`:'';}
function weekStart(){const i=dow(sel.y,sel.m,sel.d);return new Date(sel.y,sel.m,sel.d-i);}
function wireCells(root,after){
  root.querySelectorAll('[data-y]').forEach(c=>c.addEventListener('click',()=>{
    selectDay(+c.dataset.y,+c.dataset.m,+c.dataset.d); if(after)after();
  }));
}

/* ---------- month grid builders (style variants) ---------- */
function monthChips(M,maxN){
  const items=dayItems(M.k);
  const evs=items.filter(x=>x.type==='ev'||x.type==='tent'||x.type==='rsvp');
  const hasTask=items.some(x=>x.type==='task');
  let chips=evs.slice(0,maxN).map(e=>`<div class="${e.type==='ev'?'chip':'chip tent'}">${e.t}</div>`).join('');
  if(evs.length>maxN)chips+=`<div class="chip more">+${evs.length-maxN} more</div>`;
  return {chips,hasTask};
}
function buildMonth(gridCls,maxChips){
  const {start,rowsN}=gridFrame();
  let cells='';
  for(let i=0;i<rowsN*7;i++){
    const M=cellMeta(i,start), {chips,hasTask}=monthChips(M,maxChips);
    cells+=`<div class="${clsFor(M)}" data-y="${M.y}" data-m="${M.m}" data-d="${M.d}"><div class="dn">${M.d}${tkBadge(hasTask)}</div>${chips}</div>`;
  }
  return monthTitleHTML()+`<div class="grid ${gridCls||''}">${cells}</div>`;
}
function buildMonthDots(){
  const {start,rowsN}=gridFrame();
  let cells='';
  for(let i=0;i<rowsN*7;i++){
    const M=cellMeta(i,start), items=dayItems(M.k);
    const evs=items.filter(x=>x.type==='ev'||x.type==='tent'||x.type==='rsvp');
    const hasTask=items.some(x=>x.type==='task');
    let dots=evs.slice(0,4).map(e=>`<span class="ed ${e.type==='tent'?'tent':''}"></span>`).join('');
    if(hasTask)dots+=`<span class="ed task" title="task due"></span>`;
    const extra=evs.length-4, plus=extra>0?`<span class="plus">+${extra}</span>`:'';
    cells+=`<div class="${clsFor(M)}" data-y="${M.y}" data-m="${M.m}" data-d="${M.d}"><div class="num">${M.d}</div><div class="dots">${dots}${plus}</div></div>`;
  }
  return monthTitleHTML()+`<div class="grid dots">${cells}</div>`;
}
function buildMonthEditorial(){
  const {start,rowsN}=gridFrame();
  let cells='';
  for(let i=0;i<rowsN*7;i++){
    const M=cellMeta(i,start), items=dayItems(M.k);
    const evs=items.filter(x=>x.type==='ev'||x.type==='tent'||x.type==='rsvp');
    const tasks=items.filter(x=>x.type==='task');
    let bars=evs.slice(0,2).map(e=>`<div class="bar ${e.type==='tent'?'tent':''}"><i></i>${e.t}</div>`).join('');
    tasks.slice(0,1).forEach(t=>{bars+=`<div class="bar task"><i></i>${t.t}</div>`;});
    const shown=Math.min(2,evs.length)+Math.min(1,tasks.length), total=evs.length+tasks.length;
    if(total>shown)bars+=`<div class="plus">+${total-shown} more</div>`;
    cells+=`<div class="${clsFor(M)}" data-y="${M.y}" data-m="${M.m}" data-d="${M.d}"><div class="dn"><span class="num2">${M.d}</span></div>${bars}</div>`;
  }
  return monthTitleHTML()+`<div class="grid edi">${cells}</div>`;
}

/* ---------- mini-month (agenda navigator) ---------- */
function buildMiniMonth(){
  const {start,rowsN}=gridFrame();
  let cells='';
  for(let i=0;i<rowsN*7;i++){
    const M=cellMeta(i,start), items=dayItems(M.k);
    const has=items.some(x=>x.type==='ev'||x.type==='rsvp');
    const tent=items.some(x=>x.type==='tent');
    const pip=has?`<span class="pip"></span>`:(tent?`<span class="pip t"></span>`:'');
    const cls=['mc',isWE(M.col)?'we':'',M.out?'out':'',M.today?'today':'',M.seld?'sel':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" data-y="${M.y}" data-m="${M.m}" data-d="${M.d}">${M.d}${pip}</div>`;
  }
  return `<div class="mtitle"><div class="nav">‹</div><b>${MON[MONTH]} ${YEAR}</b><div class="nav">›</div><div class="sp"></div></div>
    <div class="mini-dow">${WD.map((w,i)=>`<span class="${isWE(i)?'we':''}">${w[0]}</span>`).join('')}</div>
    <div class="mini-m">${cells}</div>`;
}

/* ---------- week time-axis ---------- */
const H0=8,H1=20,PXH=30;
function buildWeek(extraCls){
  const ws=weekStart(), days=[];
  for(let i=0;i<7;i++){const dt=new Date(ws);dt.setDate(ws.getDate()+i);days.push(dt);}
  let head='<div class="wd"></div>';
  days.forEach((dt,i)=>{
    const today=(dt.getFullYear()===TODAY.y&&dt.getMonth()===TODAY.m&&dt.getDate()===TODAY.d);
    const seld=(dt.getFullYear()===sel.y&&dt.getMonth()===sel.m&&dt.getDate()===sel.d);
    head+=`<div class="wd ${isWE(i)?'we':''} ${today?'today':''} ${seld?'sel':''}" data-y="${dt.getFullYear()}" data-m="${dt.getMonth()}" data-d="${dt.getDate()}">${WD[i]}<b>${dt.getDate()}</b></div>`;
  });
  let allday='<div class="albl">due</div>';
  days.forEach(dt=>{
    const k=key(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const tasks=dayItems(k).filter(x=>x.type==='task');
    allday+=`<div class="col">${tasks.map(t=>`<div class="allchip" title="task due">${t.t}</div>`).join('')}</div>`;
  });
  const rows=H1-H0;
  let axis='<div class="axis" style="height:'+(rows*PXH)+'px">';
  for(let h=H0;h<=H1;h++)axis+=`<div class="hr" style="top:${(h-H0)*PXH}px">${h}:00</div>`;
  axis+='</div>';
  let cols='';
  days.forEach((dt,i)=>{
    const k=key(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const today=(dt.getFullYear()===TODAY.y&&dt.getMonth()===TODAY.m&&dt.getDate()===TODAY.d);
    let lines='';for(let h=H0;h<=H1;h++)lines+=`<div class="gl" style="top:${(h-H0)*PXH}px"></div>`;
    const evs=dayItems(k).filter(x=>(x.type==='ev'||x.type==='tent'||x.type==='rsvp')&&x.s!=null);
    let blocks='';
    evs.forEach(e=>{
      const top=(Math.max(H0,e.s)-H0)*PXH, ht=Math.max(16,(Math.min(H1,e.e)-Math.max(H0,e.s))*PXH-2);
      blocks+=`<div class="${e.type==='ev'?'evt':'evt tent'}" style="top:${top}px;height:${ht}px"><b>${fmtH(e.s)}</b>${e.t}</div>`;
    });
    cols+=`<div class="wcol ${isWE(i)?'we':''} ${today?'today':''}" style="height:${rows*PXH}px">${lines}${blocks}</div>`;
  });
  const span=`${days[0].getDate()} ${MON[days[0].getMonth()]} – ${days[6].getDate()} ${MON[days[6].getMonth()]}`;
  return `<div class="mtitle"><div class="nav">‹</div><b>${span}</b><div class="nav">›</div><div class="sp"></div></div>
    <div class="week ${extraCls||''}"><div class="wkhead">${head}</div><div class="wkallday">${allday}</div><div class="wkbody">${axis}${cols}</div></div>`;
}

/* ---------- week strip (split bottom) ---------- */
function buildWeekStrip(){
  const ws=weekStart(), days=[];
  for(let i=0;i<7;i++){const dt=new Date(ws);dt.setDate(ws.getDate()+i);days.push(dt);}
  let cols='';
  days.forEach((dt,i)=>{
    const k=key(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const today=(dt.getFullYear()===TODAY.y&&dt.getMonth()===TODAY.m&&dt.getDate()===TODAY.d);
    const seld=(dt.getFullYear()===sel.y&&dt.getMonth()===sel.m&&dt.getDate()===sel.d);
    const items=dayItems(k);
    const evs=items.filter(x=>x.type==='ev'||x.type==='tent'||x.type==='rsvp');
    const hasTask=items.some(x=>x.type==='task');
    let chips=evs.slice(0,2).map(e=>`<div class="${e.type==='ev'?'chip':'chip tent'}">${fmtH(e.s)} ${e.t}</div>`).join('');
    if(evs.length>2)chips+=`<div class="chip more">+${evs.length-2}</div>`;
    cols+=`<div class="wsc ${isWE(i)?'we':''} ${today?'today':''} ${seld?'sel':''}" data-y="${dt.getFullYear()}" data-m="${dt.getMonth()}" data-d="${dt.getDate()}">
      <div class="wsh"><span>${WD[i]}</span><b>${dt.getDate()}</b>${tkBadge(hasTask)}</div>${chips}</div>`;
  });
  return `<div class="wstrip">${cols}</div>`;
}

/* ====================================================================
   AGENDA (selected-day) — shared HTML
   ==================================================================== */
function agendaHTML(){
  const k=key(sel.y,sel.m,sel.d), items=dayItems(k);
  const evs=items.filter(x=>x.type==='ev'||x.type==='tent');
  const tasks=items.filter(x=>x.type==='task');
  const rsvps=items.filter(x=>x.type==='rsvp');
  const i=dow(sel.y,sel.m,sel.d);
  const isToday=(sel.y===TODAY.y&&sel.m===TODAY.m&&sel.d===TODAY.d);
  const full=`${WD[i]} ${sel.d} ${MON[sel.m]}`;
  let html=`<div class="sidehead"><b>${full}</b>${isToday?`<span class="rel">today</span>`:''}</div>
    <div class="sidesub">${evs.length} event${evs.length!==1?'s':''} · ${tasks.length} task${tasks.length!==1?'s':''} due${rsvps.length?` · ${rsvps.length} needs RSVP`:''}</div>`;
  html+=`<div class="eyebrow">Schedule</div>`;
  if(!evs.length)html+=`<div class="empty">No events.</div>`;
  evs.sort((a,b)=>(a.s||0)-(b.s||0)).forEach(e=>{
    const tent=e.type==='tent';
    html+=`<div class="ev ${tent?'tent':''}"><div class="tm">${fmtH(e.s)}</div><div class="body">
      <div class="ti">${e.t} ${tent?'<span class="tag held">held</span>':''}</div>
      ${e.sub?`<small>${e.sub}</small>`:''}
      ${tent?`<div class="approve"><button class="mini-btn primary" title="writes to Google">Approve</button><button class="mini-btn">Dismiss</button></div>`:''}
    </div></div>`;
  });
  if(rsvps.length){
    html+=`<div class="eyebrow">Needs RSVP</div>`;
    rsvps.forEach(r=>{
      html+=`<div class="rsvp"><h4>${r.t} <span class="tag a">external</span></h4>
        <div class="why">${r.sub||'Responding sends an RSVP to the organiser.'} Staged to the Review card before it leaves Artemis.</div>
        <div class="acts"><button class="chip-act">review →</button></div></div>`;
    });
  }
  html+=`<div class="eyebrow">Tasks due</div>`;
  if(!tasks.length)html+=`<div class="empty">Nothing due.</div>`;
  tasks.forEach((t,idx)=>{
    html+=`<div class="task"><div class="chk" data-i="${idx}"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></div>
      <div class="body"><div class="ti">${t.t}</div>${t.sub?`<small>${t.sub}</small>`:''}</div>
      <span class="tag a">due</span></div>`;
  });
  html+=`<div class="addev" title="self-only edit · applied inline"><span class="pl">+</span> add event</div>`;
  return html;
}
function wireAgenda(root){root.querySelectorAll('.chk').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));}

/* dashboard widget rail */
function dashboardHTML(){
  const k=key(sel.y,sel.m,sel.d), items=dayItems(k);
  const evs=items.filter(x=>x.type==='ev'||x.type==='tent');
  const tasks=items.filter(x=>x.type==='task');
  const rsvps=items.filter(x=>x.type==='rsvp');
  const i=dow(sel.y,sel.m,sel.d);
  const isToday=(sel.y===TODAY.y&&sel.m===TODAY.m&&sel.d===TODAY.d);
  let html=`<div class="sidehead"><b>${WD[i]} ${sel.d} ${MON[sel.m]}</b>${isToday?`<span class="rel">today</span>`:''}</div><div class="sidesub">day overview</div>`;
  html+=`<div class="wtile"><div class="wt">Next up</div>`;
  if(evs.length){
    evs.sort((a,b)=>(a.s||0)-(b.s||0)).slice(0,3).forEach(e=>{
      html+=`<div class="wrow"><span class="tm">${fmtH(e.s)}</span>${e.t}${e.type==='tent'?' <span class="tag held">held</span>':''}</div>`;
    });
    const t=evs.find(e=>e.type==='tent');
    if(t)html+=`<div class="approve"><button class="mini-btn primary" title="writes to Google">Approve held</button><button class="mini-btn">Dismiss</button></div>`;
  } else html+=`<div class="empty">No events.</div>`;
  html+=`</div>`;
  html+=`<div class="wtile"><div class="wt">Tasks due <span class="tag a">${tasks.length}</span></div>`;
  if(tasks.length)tasks.forEach((t,idx)=>{html+=`<div class="task"><div class="chk" data-i="${idx}"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></div><div class="body"><div class="ti">${t.t}</div></div><span class="tag a">due</span></div>`;});
  else html+=`<div class="empty">Nothing due.</div>`;
  html+=`</div>`;
  if(rsvps.length){
    html+=`<div class="wtile"><div class="wt">Needs RSVP</div>`;
    rsvps.forEach(r=>{html+=`<div class="rsvp"><h4>${r.t} <span class="tag a">external</span></h4><div class="why">${r.sub||''} Staged to Review.</div><div class="acts"><button class="chip-act">review →</button></div></div>`;});
    html+=`</div>`;
  }
  html+=`<div class="addev" title="self-only edit · applied inline"><span class="pl">+</span> add event</div>`;
  return html;
}

/* ====================================================================
   variant orchestration
   ==================================================================== */
function buildMainFor(v){
  // month/week toggle honoured where it makes sense
  if(v==='week') return buildWeek();
  if(view==='week' && (v==='classic'||v==='compact'||v==='roomy'||v==='dashboard'||v==='editorial'||v==='dots'||v==='gridfull'))
    return buildWeek();
  switch(v){
    case 'compact':   return buildMonth('compact',2);
    case 'roomy':     return buildMonth('roomy',3);
    case 'editorial': return buildMonthEditorial();
    case 'dots':      return buildMonthDots();
    case 'agenda':    return buildMiniMonth();
    case 'split':     return `<div class="stack"><div class="half"><div class="lbl">Month</div>${buildMonth('',1)}</div><div class="half"><div class="lbl">This week</div>${buildWeekStrip()}</div></div>`;
    case 'gridfull':  return buildMonth('',2)+`<div class="slideover" id="slideover"><div class="x so-x" onclick="closeSlide()">✕</div><div id="soBody"></div></div>`;
    default:          return buildMonth('',3);   // classic
  }
}
function layoutClasses(v){
  const c=['panes'];
  if(v==='gridfull')c.push('full');
  else if(v==='agenda')c.push('agenda');
  else if(v==='roomy')c.push('roomy');
  else if(v==='compact')c.push('compact');
  else if(v==='editorial')c.push('slim');
  return c.join(' ');
}
function applyLayout(){
  const dov=document.getElementById('dov'), panes=document.getElementById('panes');
  dov.classList.remove('roomy','compact');
  if(variant==='roomy')dov.classList.add('roomy');
  if(variant==='compact')dov.classList.add('compact');
  panes.className=layoutClasses(variant);
}
function renderMain(){
  closeSlide();
  document.getElementById('mainPane').innerHTML=buildMainFor(variant);
  const main=document.getElementById('mainPane');
  wireCells(main, variant==='gridfull'?openSlide:null);   // month/strip cells + week-head days carry data-*
}
function renderSide(){
  const pane=document.getElementById('sidePane');
  if(getComputedStyle(pane).display==='none')return;
  pane.innerHTML=(variant==='dashboard')?dashboardHTML():agendaHTML();
  wireAgenda(pane);
}
function rerender(){applyLayout();renderMain();renderSide();}
function selectDay(y,m,d){sel={y,m,d};renderMain();renderSide();if(variant==='gridfull')openSlide();}
function setVariant(v){
  variant=v;
  document.querySelectorAll('#vswitch button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('vname').textContent=(VARIANTS.find(x=>x.id===v)||{}).name||'';
  rerender();
}
function setView(v){
  view=v;
  document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  rerender();
}
function goToday(){selectDay(TODAY.y,TODAY.m,TODAY.d);}

/* slide-over (gridfull) */
function openSlide(){const so=document.getElementById('slideover');if(!so)return;
  document.getElementById('soBody').innerHTML=agendaHTML();wireAgenda(document.getElementById('soBody'));so.classList.add('on');}
function closeSlide(){const so=document.getElementById('slideover');if(so)so.classList.remove('on');}

/* build the pill row */
(function(){const w=document.getElementById('vswitch');
  w.innerHTML=VARIANTS.map((v,i)=>`<button data-v="${v.id}" class="${i===0?'on':''}" onclick="setVariant('${v.id}')">${v.name.split(' — ')[0].split(' (')[0]}</button>`).join('');})();

/* ====================================================================
   AMBIENT THEMING (copied verbatim) — 4 seasons × 4 times
   ==================================================================== */
const bg=document.getElementById('bg'), bg2=document.getElementById('bg2');
bg.style.zIndex='1'; bg2.style.zIndex='0';
let _front=bg;
function setPhoto(url,bright){
  const inc=_front===bg?bg2:bg;
  inc.style.transition='none'; inc.style.opacity='0';
  inc.style.backgroundImage=`url(${url})`;
  inc.style.filter=`brightness(${bright}) saturate(1.08) blur(1.5px)`;
  inc.style.zIndex='2'; void inc.offsetWidth;
  inc.style.transition='opacity .8s ease'; inc.style.opacity='1';
  _front.style.zIndex='1'; _front=inc;
}
const SEASONS=['Spring','Summer','Autumn','Winter'], TIMES=['morning','afternoon','evening','night'];
const DIM={morning:.70,afternoon:.80,evening:.60,night:.40};
const PAL={
  'Spring|morning':{bg:'#08120e',p:'#8fecb8',a:'#ffc2a6',v:1}, 'Spring|afternoon':{bg:'#0a1612',p:'#5fee9c',a:'#84d2ff',v:1},
  'Spring|evening':{bg:'#0a0c0d',p:'#f2b487',a:'#93d59a',v:1}, 'Spring|night':{bg:'#05080f',p:'#5aa6d0',a:'#8fd0a8',v:0},
  'Summer|morning':{bg:'#0e0a10',p:'#ff9e6e',a:'#8fb0ff',v:0}, 'Summer|afternoon':{bg:'#11140a',p:'#ffd64a',a:'#58c4f2',v:0},
  'Summer|evening':{bg:'#0d0908',p:'#ff9f4a',a:'#ff5e8a',v:0}, 'Summer|night':{bg:'#06080f',p:'#4f9fc8',a:'#e3a06f',v:0},
  'Autumn|morning':{bg:'#0f0c08',p:'#e3b572',a:'#93b39c',v:1}, 'Autumn|afternoon':{bg:'#100a05',p:'#f0a23f',a:'#c2552b',v:1},
  'Autumn|evening':{bg:'#0d0606',p:'#ff7338',a:'#9a5ab0',v:1}, 'Autumn|night':{bg:'#0a0707',p:'#a06a44',a:'#6a5a7a',v:0},
  'Winter|morning':{bg:'#080d14',p:'#abe0ff',a:'#ffc7a6',v:1}, 'Winter|afternoon':{bg:'#060c14',p:'#58c6ff',a:'#fff0d8',v:1},
  'Winter|evening':{bg:'#07091a',p:'#8aa6ff',a:'#ffb479',v:1}, 'Winter|night':{bg:'#05070e',p:'#5a76b0',a:'#b88a5c',v:0}
};
let amb={season:'Winter',time:'afternoon'};
function setAmbient(season,time){
  amb={season,time}; const c=PAL[season+'|'+time], R=document.documentElement.style;
  R.setProperty('--bg',c.bg); R.setProperty('--p',c.p); R.setProperty('--a',c.a);
  setPhoto(`https://picsum.photos/seed/artemis-${season.toLowerCase()}-${time}/1920/1080`,DIM[time]);
  document.getElementById('ambLabel').textContent=`${season}·${time}`;
  document.querySelectorAll('.amb-cell').forEach(b=>b.classList.toggle('act',b.dataset.s===season&&b.dataset.t===time));
}
(function(){const g=document.getElementById('ambGrid');
  g.innerHTML='<span></span>'+TIMES.map(t=>`<span class="amb-h">${t}</span>`).join('');
  SEASONS.forEach(s=>{g.insertAdjacentHTML('beforeend',`<span class="amb-rh">${s}</span>`);
    TIMES.forEach(t=>{const c=PAL[s+'|'+t];
      g.insertAdjacentHTML('beforeend',`<button class="amb-cell${c.v?'':' draft'}" data-s="${s}" data-t="${t}" title="${s} · ${t}${c.v?'':' · draft'}" style="background:${c.bg}"><i style="background:${c.p}"></i><i style="background:${c.a}"></i></button>`);});});
  g.querySelectorAll('.amb-cell').forEach(b=>b.onclick=()=>setAmbient(b.dataset.s,b.dataset.t));})();
function toggleAmb(){document.getElementById('ambPop').classList.toggle('on');}
function ambNow(){const d=new Date(), m=d.getMonth(), h=d.getHours()+d.getMinutes()/60;
  const season=['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'][m];
  const time=(h>=23.5||h<7.25)?'night':h<12?'morning':h<17?'afternoon':'evening';
  setAmbient(season,time);}
document.addEventListener('click',e=>{const p=document.getElementById('ambPop');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('#ambBtn'))p.classList.remove('on');});
addEventListener('keydown',e=>{if(e.key==='Escape'){const p=document.getElementById('ambPop');
  if(p.classList.contains('on'))p.classList.remove('on');else closeSlide();}});

/* ---------- boot (default: classic) ---------- */
setVariant('classic');
setAmbient('Winter','afternoon');
</script>
