<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artemis — Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* register ambient tokens as typed colours so they interpolate (smooth cross-fade) */
  @property --bg{syntax:"<color>";inherits:true;initial-value:#060c14}
  @property --p{syntax:"<color>";inherits:true;initial-value:#58c6ff}
  @property --a{syntax:"<color>";inherits:true;initial-value:#fff0d8}
  :root{
    --bg:#060c14; --p:#58c6ff; --a:#fff0d8;                 /* ambient — set by the resolver (default Winter·afternoon) */
    --ok:#67e0a3; --over:#ff6e8a; --text:#eef7ff; --muted:#a8bccb;
    --glass:color-mix(in srgb,var(--bg) 33%,transparent); --glass2:color-mix(in srgb,var(--bg) 19%,transparent);
    --hair:color-mix(in srgb,var(--p) 22%,transparent);
    font-synthesis:none;
    transition:--bg .8s cubic-bezier(.4,0,.2,1),--p .8s cubic-bezier(.4,0,.2,1),--a .8s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{color:var(--text);font-family:'Inter',system-ui,'Segoe UI',sans-serif;height:100%;background:var(--bg)}
  .bg{position:fixed;inset:-40px;z-index:0;background-size:cover;background-position:center;filter:brightness(.66) saturate(1.08) blur(1.5px);transition:opacity .8s ease}
  .bg-grad{position:fixed;inset:0;z-index:5;pointer-events:none;background:
    radial-gradient(1200px 820px at 50% -8%, rgba(40,90,120,.16), transparent 60%),
    linear-gradient(180deg, rgba(7,13,22,.20), rgba(7,13,22,.46) 72%, rgba(7,13,22,.62))}
  .app{position:fixed;inset:0;z-index:6}

  /* top bar (ambient toggle lives here, like the workspace) */
  .top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:13px;padding:13px 20px;z-index:50}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:23px;height:23px;filter:drop-shadow(0 0 6px var(--p))}
  .brand b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.2em;font-size:12.5px}
  .crumb{font-family:'Space Grotesk';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding-left:13px;border-left:1px solid var(--hair)}
  .crumb b{color:var(--p);font-weight:500}
  .top .sp{flex:1}
  .ghost{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);backdrop-filter:blur(8px);transition:.16s}
  .ghost:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .ghost svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}
  .stat{display:flex;align-items:center;gap:11px}
  .s{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 7px var(--p)}
  .dot.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}

  /* ---- ambient popover (copied) ---- */
  .amb-pop{position:absolute;top:50px;right:20px;width:344px;z-index:60;padding:13px;border-radius:16px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 60%,transparent),color-mix(in srgb,var(--bg) 44%,transparent));
    backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05),inset 0 0 26px -6px color-mix(in srgb,var(--p) 18%,transparent),0 2px 6px -2px rgba(0,0,0,.4),0 32px 80px -28px #000,0 0 40px -16px var(--p);opacity:0;transform:translateY(-8px);pointer-events:none;transition:.2s}
  .amb-pop.on{opacity:1;transform:none;pointer-events:auto}
  .amb-pop-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .amb-pop-head b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.16em;font-size:11px;text-transform:uppercase}
  .amb-pop-head .sub{font-size:10px;color:var(--muted)}
  .amb-pop-head #ambAuto{margin-left:auto;font-family:'Space Grotesk';font-size:10.5px;color:#eaf7ff;border:1px solid color-mix(in srgb,var(--p) 38%,transparent);border-radius:7px;padding:4px 9px;cursor:pointer;background:color-mix(in srgb,var(--p) 14%,transparent)}
  .amb-pop-head #ambAuto:hover{background:color-mix(in srgb,var(--p) 24%,transparent)}
  .amb-grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:5px;align-items:center}
  .amb-h{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center}
  .amb-rh{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);padding-right:5px;text-align:right}
  .amb-cell{position:relative;height:30px;border-radius:8px;border:1px solid var(--hair);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden;transition:.14s}
  .amb-cell:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--p) 45%,transparent)}
  .amb-cell.draft{border-style:dashed;opacity:.85}
  .amb-cell i{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px -1px rgba(0,0,0,.6)}
  .amb-cell.act{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 16px -4px var(--p)}
  .amb-note{margin-top:11px;font-size:10px;line-height:1.45;color:var(--muted)}

  /* ---------- the opened Tasks detail panel ---------- */
  .dov-scrim{position:fixed;inset:0;z-index:44;background:rgba(3,7,13,.20)}
  .dov{position:fixed;z-index:45;left:50%;top:54%;transform:translate(-50%,-50%);
    width:900px;max-width:94vw;height:618px;max-height:82vh;
    display:flex;flex-direction:column;border-radius:18px;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 46%,transparent),color-mix(in srgb,var(--bg) 32%,transparent));
    backdrop-filter:blur(32px) saturate(150%);-webkit-backdrop-filter:blur(32px) saturate(150%);
    border:1px solid color-mix(in srgb,var(--p) 34%,transparent);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.24),inset 0 -1px 0 rgba(255,255,255,.06),inset 0 0 40px -10px color-mix(in srgb,var(--p) 16%,transparent),0 4px 12px -3px rgba(0,0,0,.5),0 50px 130px -28px #000,0 0 64px -16px var(--p)}
  .dov::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.32;background:linear-gradient(162deg,rgba(255,255,255,.12),transparent 30%);mix-blend-mode:screen;z-index:1}

  /* header row */
  .chrome{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--hair);position:relative;z-index:3}
  .chrome .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-size:16px;background:color-mix(in srgb,var(--p) 12%,transparent);border:1px solid color-mix(in srgb,var(--p) 22%,transparent)}
  .chrome h3{font-family:'Space Grotesk';font-weight:500;font-size:16px;letter-spacing:.01em}
  .chrome .sp{flex:1}
  .pill{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);transition:.16s}
  .pill:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .pill.accent{border-color:color-mix(in srgb,var(--p) 42%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 15%,transparent);box-shadow:0 0 18px -8px var(--p)}
  .pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
  .x{width:26px;height:26px;display:grid;place-items:center;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;flex:0 0 auto}
  .x:hover{background:rgba(255,255,255,.08);color:var(--text)}

  /* quick-add bar */
  .qadd{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--hair);border-radius:11px;background:color-mix(in srgb,var(--p) 6%,transparent)}
  .qadd .pl{width:20px;height:20px;border-radius:6px;border:1px solid var(--hair);display:grid;place-items:center;font-size:14px;color:var(--p);flex:0 0 auto}
  .qadd input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:'Inter';font-size:13px}
  .qadd input::placeholder{color:var(--muted)}
  .qadd kbd{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);border:1px solid var(--hair);border-radius:5px;padding:2px 6px}

  /* body host */
  .body{flex:1;min-height:0;position:relative;z-index:2;display:flex;flex-direction:column}

  /* ===== shared atoms ===== */
  .eyebrow{font-family:'Space Grotesk';font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
  .eyebrow .ct{color:var(--p);font-size:9px}
  .eyebrow.over{color:var(--over)} .eyebrow.over .ct{color:var(--over)}
  .eyebrow .ln{flex:1;height:1px;background:var(--hair)}

  .task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--hair);font-size:13px}
  .task:first-child{border-top:0}
  .chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--hair);flex:0 0 auto;display:grid;place-items:center;margin-top:1px;cursor:pointer;transition:.14s}
  .chk svg{width:11px;height:11px;stroke:var(--ok);fill:none;stroke-width:2.4;opacity:0}
  .chk.on{border-color:color-mix(in srgb,var(--ok) 55%,transparent);background:color-mix(in srgb,var(--ok) 14%,transparent)}.chk.on svg{opacity:1}
  .task .body2{flex:1;min-width:0}
  .task .ti{color:#e7f1fa}
  .task.done .ti{text-decoration:line-through;color:var(--muted)}
  .task small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
  .row-end{margin-left:auto;display:flex;align-items:center;gap:6px;flex:0 0 auto}

  .tag{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .tag.a{color:var(--a);border-color:color-mix(in srgb,var(--a) 38%,transparent)}
  .tag.due{color:var(--p);border-color:color-mix(in srgb,var(--p) 38%,transparent)}
  .tag.over{color:var(--over);border-color:color-mix(in srgb,var(--over) 45%,transparent);background:color-mix(in srgb,var(--over) 8%,transparent)}
  .tag.proj{color:#cfe1ee}
  .tag.proj::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--a);margin-right:5px;vertical-align:1px;box-shadow:0 0 6px var(--a)}

  /* small icon action buttons (reschedule / time-block) */
  .iact{width:24px;height:24px;border-radius:7px;border:1px solid var(--hair);display:grid;place-items:center;cursor:pointer;color:var(--muted);background:transparent;transition:.14s}
  .iact:hover{color:#eaf7ff;border-color:color-mix(in srgb,var(--p) 45%,transparent);background:color-mix(in srgb,var(--p) 10%,transparent)}
  .iact svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
  .iact.am:hover{color:var(--a);border-color:color-mix(in srgb,var(--a) 50%,transparent);background:color-mix(in srgb,var(--a) 10%,transparent)}
  .iact.blocked{color:var(--a);border-color:color-mix(in srgb,var(--a) 45%,transparent);background:color-mix(in srgb,var(--a) 12%,transparent)}

  /* capture / suggestion inbox card */
  .sug{border:1px dashed color-mix(in srgb,var(--a) 45%,transparent);border-radius:11px;padding:10px 11px;background:color-mix(in srgb,var(--a) 5%,transparent);display:flex;flex-direction:column;gap:7px}
  .sug.gone{opacity:.35;filter:saturate(.4)}
  .sug .src{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--a);display:flex;align-items:center;gap:5px}
  .sug .src svg{width:11px;height:11px;stroke:var(--a);fill:none;stroke-width:1.7}
  .sug .stt{color:#f2f7fc;font-size:13px}
  .sug .acts{display:flex;gap:7px}
  .mini-btn{font-family:'Space Grotesk';font-size:10.5px;border-radius:7px;padding:4px 11px;cursor:pointer;border:1px solid var(--hair);color:#cfe1ee;background:transparent;transition:.15s}
  .mini-btn:hover{background:rgba(255,255,255,.06)}
  .mini-btn.primary{border-color:color-mix(in srgb,var(--a) 50%,transparent);color:#fff;background:color-mix(in srgb,var(--a) 14%,transparent)}
  .mini-btn.primary:hover{background:color-mix(in srgb,var(--a) 24%,transparent)}

  .scroll{overflow:auto;min-height:0}
  .scroll::-webkit-scrollbar{width:8px}
  .scroll::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--p) 20%,transparent);border-radius:8px}

  /* ===== roomy airy two-pane (Today focus rail + the rest) ===== */
  .v8{flex:1;display:flex;min-height:0}
  .v8 .focus{flex:0 0 320px;padding:16px 18px;border-right:1px solid var(--hair);display:flex;flex-direction:column;min-width:0;overflow:auto;
    background:linear-gradient(180deg,color-mix(in srgb,var(--p) 6%,transparent),transparent 40%)}
  .v8 .focus-h{font-family:'Space Grotesk';font-weight:500;font-size:17px;margin-bottom:2px}
  .v8 .focus-h .rel{font-size:11px;color:var(--p);font-weight:400;margin-left:7px}
  .v8 .focus .sub{font-size:11px;color:var(--muted);margin-bottom:14px}
  .v8 .qwrap{margin-bottom:14px}
  .v8 .bigtask{padding:11px 0;border-top:1px solid var(--hair);font-size:14px;display:flex;gap:11px;align-items:flex-start}
  .v8 .bigtask:first-of-type{border-top:0}
  .v8 .rest{flex:1;padding:16px 18px;overflow:auto;min-width:0;display:flex;flex-direction:column;gap:16px}
  .v8 .restgrp .grp-t{font-family:'Space Grotesk';font-size:12px;color:#cfe1ee;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .v8 .restgrp .grp-t.over{color:var(--over)}

  @media (prefers-reduced-motion:reduce){:root{transition:none!important}.bg{transition:none!important}.amb-pop{transition:none!important}}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="bg" id="bg2" style="opacity:0"></div>
<div class="bg-grad"></div>

<div class="app" id="app">
  <div class="top">
    <div class="brand"><svg viewBox="0 0 32 32" fill="none" stroke="#5ec8ff" stroke-width="1.6"><circle cx="16" cy="16" r="9"/><path d="M16 4a12 12 0 0 0 0 24" stroke-linecap="round"/><circle cx="16" cy="16" r="2.3" fill="#5ec8ff" stroke="none"/></svg><b>ARTEMIS</b></div>
    <div class="crumb">Home / <b>Tasks</b></div>
    <div class="sp"></div>
    <button class="ghost amb-btn" id="ambBtn" onclick="toggleAmb()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.1 5.1l2 2M16.9 16.9l2 2M18.9 5.1l-2 2M7.1 16.9l-2 2"/></svg> Ambient</button>
    <div class="stat"><span class="s"><span class="dot"></span> <span id="ambLabel">Winter·afternoon</span></span><span class="s"><span class="dot ok"></span> Connected</span></div>
    <div class="amb-pop" id="ambPop">
      <div class="amb-pop-head"><b>Ambient</b><span class="sub">season × time</span><button id="ambAuto" onclick="ambNow()">Auto · now</button></div>
      <div class="amb-grid" id="ambGrid"></div>
      <div class="amb-note">Auto-shifts with the real clock + calendar — 4 seasons × 4 time-states = 16 palettes. Dashed = draft (not yet hand-tuned). Photo + palette rotate per cell.</div>
    </div>
  </div>

  <!-- the opened Tasks card -->
  <div class="dov-scrim"></div>
  <div class="dov">
    <div class="chrome">
      <div class="ic">✅</div>
      <div><h3>Tasks</h3></div>
      <div class="sp"></div>
      <button class="pill accent" id="hdrQadd" title="Quick-add a task"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> add task</button>
      <div class="x" title="Back to map">✕</div>
    </div>
    <div class="body" id="vbody"><!-- Tasks layout injected here --></div>
  </div>
</div>

<script>
/* ====================================================================
   Tasks detail — canonical roomy two-pane layout. Today = Tue 23 Jun 2026.
   Engine truths honoured:
     - Projects -> Tasks (Areas were DROPPED; no Area layer)
     - check-off = line-through (self-only, inline)
     - reschedule + time-block-into-morning-focus are inline affordances
     - suggestions are inert captures from email/chat (Accept / Dismiss)
   ==================================================================== */

/* ---------- seeded sample data (continuous with the other mockups) ---------- */
// bucket: 'today' | 'over' | 'up' ;  done flags a completed task
const TASKS=[
  // due today
  {id:'t1', title:'Reply to landlord',     bucket:'today', when:'Today',     proj:null,         done:false},
  {id:'t2', title:'Book Penang flights',   bucket:'today', when:'Today',     proj:'Penang trip',done:false},
  {id:'t3', title:'Standup notes to Debby',bucket:'today', when:'Today 5pm', proj:null,         done:false},
  // overdue (accent)
  {id:'t4', title:'Pay SP Group bill',     bucket:'over',  when:'Yesterday', proj:null,         done:false},
  {id:'t5', title:'Renew domain',          bucket:'over',  when:'Mon',       proj:null,         done:false},
  // upcoming
  {id:'t6', title:'Draft Q3 review',       bucket:'up',    when:'This week', proj:null,         done:false},
  {id:'t7', title:'Call dentist',          bucket:'up',    when:'Fri',       proj:null,         done:false},
  {id:'t8', title:'Confirm Penang hotel',  bucket:'up',    when:'Jul 10',    proj:'Penang trip',done:false},
  {id:'t9', title:'Compare Fri vs Sat flights',bucket:'up',when:'Jul 2',     proj:'Penang trip',done:false},
  // done (line-through)
  {id:'t10',title:'Send invoice #204',     bucket:'today', when:'Today',     proj:null,         done:true},
  {id:'t11',title:'Water the plants',      bucket:'over',  when:'Mon',       proj:null,         done:true}
];
const SUGS=[
  {id:'s1', src:'Gmail',   title:'Reply to landlord re: lease renewal', gone:false},
  {id:'s2', src:'Gmail',   title:'Book Penang flights — fare alert',    gone:false},
  {id:'s3', src:'WhatsApp',title:'Call dentist back (Dr Lim)',          gone:false}
];
const BUCKETS={over:{label:'Overdue',cls:'over'},today:{label:'Due today',cls:''},up:{label:'Upcoming',cls:''}};

/* ---------- small builders ---------- */
const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function chkHTML(on){return `<div class="chk${on?' on':''}"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></div>`;}
function whenTag(t){
  const c=t.bucket==='over'?'over':t.bucket==='today'?'due':'';
  return `<span class="tag ${c}">${t.when}</span>`;
}
function projTag(t){return t.proj?`<span class="tag proj">${esc(t.proj)}</span>`:'';}
const ICO_CAL='<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>';
const ICO_SUN='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/></svg>';
const ICO_MAIL='<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>';
const ICO_CHAT='<svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-4.2A8 8 0 1 1 21 12Z"/></svg>';
function rowActions(){
  return `<button class="iact" title="Reschedule">${ICO_CAL}</button>`+
         `<button class="iact am" title="Time-block into a morning focus slot">${ICO_SUN}</button>`;
}
function sugIcon(src){return src==='Gmail'?ICO_MAIL:ICO_CHAT;}

/* ---------- listener teardown registry ---------- */
let _cleanup=[];
function on(el,ev,fn){el.addEventListener(ev,fn);_cleanup.push(()=>el.removeEventListener(ev,fn));}
function teardown(){_cleanup.forEach(fn=>fn());_cleanup=[];}

function wireChecks(scope, sel){
  scope.querySelectorAll('.chk').forEach(c=>{
    on(c,'click',()=>{
      c.classList.toggle('on');
      const row=c.closest(sel);
      if(row)row.classList.toggle('done',c.classList.contains('on'));
    });
  });
}
function wireTimeBlock(scope){
  scope.querySelectorAll('.iact.am').forEach(b=>on(b,'click',()=>b.classList.toggle('blocked')));
}
function wireSugs(scope){
  scope.querySelectorAll('.sug').forEach(card=>{
    card.querySelectorAll('.mini-btn').forEach(btn=>on(btn,'click',()=>card.classList.add('gone')));
  });
}

/* ====================================================================
   roomy two-pane: Today focus rail + everything else
   ==================================================================== */
function build(){
  const today=TASKS.filter(t=>t.bucket==='today'&&!t.done);
  let focus='';
  today.forEach(t=>{
    focus+=`<div class="bigtask">${chkHTML(false)}
      <div class="body2" style="flex:1"><div class="ti">${esc(t.title)}</div>${t.proj?`<small>${esc(t.proj)}</small>`:''}</div>
      <div class="row-end"><button class="iact am" title="Time-block into a morning focus slot">${ICO_SUN}</button></div></div>`;
  });
  let rest='';
  ['over','up'].forEach(b=>{
    const items=TASKS.filter(t=>t.bucket===b&&!t.done);if(!items.length)return;
    const B=BUCKETS[b];
    let rows='';
    items.forEach(t=>{
      rows+=`<div class="task${t.done?' done':''}">${chkHTML(t.done)}
        <div class="body2"><div class="ti">${esc(t.title)}</div></div>
        <div class="row-end">${projTag(t)}${whenTag(t)}${rowActions()}</div></div>`;
    });
    rest+=`<div class="restgrp"><div class="grp-t ${B.cls}">${B.label} · ${items.length}</div>${rows}</div>`;
  });
  // captures live airy at the bottom of the rest pane
  let caps='';
  SUGS.forEach(s=>{
    caps+=`<div class="sug"><div class="src">${sugIcon(s.src)} ${s.src}</div>
      <div class="stt">${esc(s.title)}</div>
      <div class="acts"><button class="mini-btn primary">Accept</button><button class="mini-btn">Dismiss</button></div></div>`;
  });
  return `<div class="v8">
    <div class="focus scroll">
      <div class="focus-h">Today<span class="rel">Tue 23 Jun</span></div>
      <div class="sub">${today.length} to do · morning focus slot free 09:00–10:30</div>
      <div class="qwrap"><div class="qadd"><span class="pl">+</span><input placeholder="Quick-add a task"/><kbd>Enter</kbd></div></div>
      ${focus}
    </div>
    <div class="rest scroll">
      ${rest}
      <div class="restgrp"><div class="grp-t">Captured · ${SUGS.length}</div>${caps}</div>
    </div></div>`;
}

function mount(){
  teardown();
  const host=document.getElementById('vbody');
  host.innerHTML=build();
  wireChecks(host, '.task, .bigtask');
  wireTimeBlock(host);
  wireSugs(host);
}
document.getElementById('hdrQadd').addEventListener('click',()=>{
  const inp=document.querySelector('#vbody input');
  if(inp)inp.focus();
});

/* ====================================================================
   AMBIENT THEMING (copied from calendar-detail / travel-zoom-workspace)
   ==================================================================== */
const bg=document.getElementById('bg'), bg2=document.getElementById('bg2');
bg.style.zIndex='1'; bg2.style.zIndex='0';
let _front=bg;
function setPhoto(url,bright){
  const inc=_front===bg?bg2:bg;
  inc.style.transition='none'; inc.style.opacity='0';
  inc.style.backgroundImage=`url(${url})`;
  inc.style.filter=`brightness(${bright}) saturate(1.08) blur(1.5px)`;
  inc.style.zIndex='2';
  void inc.offsetWidth;
  inc.style.transition='opacity .8s ease';
  inc.style.opacity='1';
  _front.style.zIndex='1'; _front=inc;
}
const SEASONS=['Spring','Summer','Autumn','Winter'], TIMES=['morning','afternoon','evening','night'];
const DIM={morning:.70,afternoon:.80,evening:.60,night:.40};
const PAL={
  'Spring|morning':{bg:'#08120e',p:'#8fecb8',a:'#ffc2a6',v:1}, 'Spring|afternoon':{bg:'#0a1612',p:'#5fee9c',a:'#84d2ff',v:1},
  'Spring|evening':{bg:'#0a0c0d',p:'#f2b487',a:'#93d59a',v:1}, 'Spring|night':{bg:'#05080f',p:'#5aa6d0',a:'#8fd0a8',v:0},
  'Summer|morning':{bg:'#0e0a10',p:'#ff9e6e',a:'#8fb0ff',v:0}, 'Summer|afternoon':{bg:'#11140a',p:'#ffd64a',a:'#58c4f2',v:0},
  'Summer|evening':{bg:'#0d0908',p:'#ff9f4a',a:'#ff5e8a',v:0}, 'Summer|night':{bg:'#06080f',p:'#4f9fc8',a:'#e3a06f',v:0},
  'Autumn|morning':{bg:'#0f0c08',p:'#e3b572',a:'#93b39c',v:1}, 'Autumn|afternoon':{bg:'#100a05',p:'#f0a23f',a:'#c2552b',v:1},
  'Autumn|evening':{bg:'#0d0606',p:'#ff7338',a:'#9a5ab0',v:1}, 'Autumn|night':{bg:'#0a0707',p:'#a06a44',a:'#6a5a7a',v:0},
  'Winter|morning':{bg:'#080d14',p:'#abe0ff',a:'#ffc7a6',v:1}, 'Winter|afternoon':{bg:'#060c14',p:'#58c6ff',a:'#fff0d8',v:1},
  'Winter|evening':{bg:'#07091a',p:'#8aa6ff',a:'#ffb479',v:1}, 'Winter|night':{bg:'#05070e',p:'#5a76b0',a:'#b88a5c',v:0}
};
let amb={season:'Winter',time:'afternoon'};
function setAmbient(season,time){
  amb={season,time}; const c=PAL[season+'|'+time], R=document.documentElement.style;
  R.setProperty('--bg',c.bg); R.setProperty('--p',c.p); R.setProperty('--a',c.a);
  setPhoto(`https://picsum.photos/seed/artemis-${season.toLowerCase()}-${time}/1920/1080`,DIM[time]);
  document.getElementById('ambLabel').textContent=`${season}·${time}`;
  document.querySelectorAll('.amb-cell').forEach(b=>b.classList.toggle('act',b.dataset.s===season&&b.dataset.t===time));
}
(function(){const g=document.getElementById('ambGrid');
  g.innerHTML='<span></span>'+TIMES.map(t=>`<span class="amb-h">${t}</span>`).join('');
  SEASONS.forEach(s=>{g.insertAdjacentHTML('beforeend',`<span class="amb-rh">${s}</span>`);
    TIMES.forEach(t=>{const c=PAL[s+'|'+t];
      g.insertAdjacentHTML('beforeend',`<button class="amb-cell${c.v?'':' draft'}" data-s="${s}" data-t="${t}" title="${s} · ${t}${c.v?'':' · draft'}" style="background:${c.bg}"><i style="background:${c.p}"></i><i style="background:${c.a}"></i></button>`);});});
  g.querySelectorAll('.amb-cell').forEach(b=>b.onclick=()=>setAmbient(b.dataset.s,b.dataset.t));})();
function toggleAmb(){document.getElementById('ambPop').classList.toggle('on');}
function ambNow(){const d=new Date(), m=d.getMonth(), h=d.getHours()+d.getMinutes()/60;
  const season=['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'][m];
  const time=(h>=23.5||h<7.25)?'night':h<12?'morning':h<17?'afternoon':'evening';
  setAmbient(season,time);}
document.addEventListener('click',e=>{const p=document.getElementById('ambPop');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('#ambBtn'))p.classList.remove('on');});
addEventListener('keydown',e=>{if(e.key==='Escape'){const p=document.getElementById('ambPop');if(p.classList.contains('on'))p.classList.remove('on');}});

/* ---------- boot ---------- */
mount();
setAmbient('Winter','afternoon');
</script>
</body>
