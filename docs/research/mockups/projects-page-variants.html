<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artemis — Projects page variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* register ambient tokens as typed colours so they interpolate (smooth cross-fade) */
  @property --bg{syntax:"<color>";inherits:true;initial-value:#060c14}
  @property --p{syntax:"<color>";inherits:true;initial-value:#58c6ff}
  @property --a{syntax:"<color>";inherits:true;initial-value:#fff0d8}
  :root{
    --bg:#060c14; --p:#58c6ff; --a:#fff0d8;                 /* ambient — set by the resolver (default Winter·afternoon) */
    --ok:#67e0a3; --warn:#ffb35e; --stop:#ff6f8a; --text:#eef7ff; --muted:#a8bccb;
    --glass:color-mix(in srgb,var(--bg) 33%,transparent); --glass2:color-mix(in srgb,var(--bg) 19%,transparent);
    --hair:color-mix(in srgb,var(--p) 22%,transparent);
    font-synthesis:none;
    transition:--bg .8s cubic-bezier(.4,0,.2,1),--p .8s cubic-bezier(.4,0,.2,1),--a .8s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{color:var(--text);font-family:'Inter',system-ui,'Segoe UI',sans-serif;height:100%;background:var(--bg)}
  .bg{position:fixed;inset:-40px;z-index:0;background-size:cover;background-position:center;filter:brightness(.66) saturate(1.08) blur(1.5px);transition:opacity .8s ease}
  .bg-grad{position:fixed;inset:0;z-index:5;pointer-events:none;background:
    radial-gradient(1200px 820px at 50% -8%, rgba(40,90,120,.16), transparent 60%),
    linear-gradient(180deg, rgba(7,13,22,.20), rgba(7,13,22,.46) 72%, rgba(7,13,22,.62))}
  .app{position:fixed;inset:0;z-index:6}

  /* top bar */
  .top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:13px;padding:13px 20px;z-index:50}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:23px;height:23px;filter:drop-shadow(0 0 6px var(--p))}
  .brand b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.2em;font-size:12.5px}
  .crumb{font-family:'Space Grotesk';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding-left:13px;border-left:1px solid var(--hair)}
  .crumb b{color:var(--p);font-weight:500}
  .top .sp{flex:1}
  .ghost{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);backdrop-filter:blur(8px);transition:.16s}
  .ghost:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .ghost svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}
  .amb-pop{position:absolute;top:50px;right:20px;width:344px;z-index:60;padding:13px;border-radius:16px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 60%,transparent),color-mix(in srgb,var(--bg) 44%,transparent));
    backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05),inset 0 0 26px -6px color-mix(in srgb,var(--p) 18%,transparent),0 2px 6px -2px rgba(0,0,0,.4),0 32px 80px -28px #000,0 0 40px -16px var(--p);opacity:0;transform:translateY(-8px);pointer-events:none;transition:.2s}
  .amb-pop.on{opacity:1;transform:none;pointer-events:auto}
  .amb-pop-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .amb-pop-head b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.16em;font-size:11px;text-transform:uppercase}
  .amb-pop-head .sub{font-size:10px;color:var(--muted)}
  .amb-pop-head #ambAuto{margin-left:auto;font-family:'Space Grotesk';font-size:10.5px;color:#eaf7ff;border:1px solid color-mix(in srgb,var(--p) 38%,transparent);border-radius:7px;padding:4px 9px;cursor:pointer;background:color-mix(in srgb,var(--p) 14%,transparent)}
  .amb-pop-head #ambAuto:hover{background:color-mix(in srgb,var(--p) 24%,transparent)}
  .amb-grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:5px;align-items:center}
  .amb-h{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center}
  .amb-rh{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);padding-right:5px;text-align:right}
  .amb-cell{position:relative;height:30px;border-radius:8px;border:1px solid var(--hair);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden;transition:.14s}
  .amb-cell:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--p) 45%,transparent)}
  .amb-cell.draft{border-style:dashed;opacity:.85}
  .amb-cell i{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px -1px rgba(0,0,0,.6)}
  .amb-cell.act{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 16px -4px var(--p)}
  .amb-note{margin-top:11px;font-size:10px;line-height:1.45;color:var(--muted)}
  .stat{display:flex;align-items:center;gap:11px}
  .s{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 7px var(--p)}
  .dot.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}

  /* ---------- variant pill switcher (top-center) ---------- */
  .switch{position:absolute;top:11px;left:50%;transform:translateX(-50%);z-index:55;display:flex;gap:4px;padding:5px;border-radius:13px;max-width:min(92vw,1040px);overflow-x:auto;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 56%,transparent),color-mix(in srgb,var(--bg) 40%,transparent));
    backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.2),inset 0 0 26px -6px color-mix(in srgb,var(--p) 16%,transparent),0 18px 50px -22px #000}
  .switch::-webkit-scrollbar{height:0}
  .switch button{font-family:'Space Grotesk';font-size:11px;letter-spacing:.02em;color:#cfe1ee;padding:6px 11px;cursor:pointer;border:0;border-radius:9px;background:transparent;white-space:nowrap;transition:.15s}
  .switch button:hover{background:color-mix(in srgb,var(--p) 10%,transparent)}
  .switch button.on{color:#eaf7ff;background:color-mix(in srgb,var(--p) 22%,transparent);box-shadow:0 0 14px -6px var(--p) inset}
  .switch button .no{opacity:.5;font-size:9.5px;margin-right:5px}

  /* ---------- the opened Projects detail panel (one big glass card) ---------- */
  .dov-scrim{position:fixed;inset:0;z-index:44;background:rgba(3,7,13,.20)}
  .dov{position:fixed;z-index:45;left:50%;top:55%;transform:translate(-50%,-50%);
    width:1080px;max-width:95vw;height:638px;max-height:82vh;
    display:flex;flex-direction:column;border-radius:18px;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 46%,transparent),color-mix(in srgb,var(--bg) 32%,transparent));
    backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);
    border:1px solid color-mix(in srgb,var(--p) 34%,transparent);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.24),inset 0 -1px 0 rgba(255,255,255,.06),inset 0 0 40px -10px color-mix(in srgb,var(--p) 16%,transparent),0 4px 12px -3px rgba(0,0,0,.5),0 50px 130px -28px #000,0 0 64px -16px var(--p)}
  .dov::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.32;background:linear-gradient(162deg,rgba(255,255,255,.12),transparent 30%);mix-blend-mode:screen}

  /* header row */
  .chrome{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--hair);position:relative;z-index:2}
  .chrome .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-size:16px;background:color-mix(in srgb,var(--p) 12%,transparent);border:1px solid color-mix(in srgb,var(--p) 22%,transparent)}
  .chrome h3{font-family:'Space Grotesk';font-weight:500;font-size:16px;letter-spacing:.01em}
  .chrome .when{font-family:'Space Grotesk';font-size:11px;color:var(--muted);letter-spacing:.04em}
  .chrome .sp{flex:1}
  .vname{font-family:'Space Grotesk';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .vname b{color:var(--p);font-weight:500}
  .pill{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);transition:.16s}
  .pill:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .pill.accent{border-color:color-mix(in srgb,var(--p) 42%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 15%,transparent);box-shadow:0 0 18px -8px var(--p)}
  .pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
  .x{width:26px;height:26px;display:grid;place-items:center;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;flex:0 0 auto}
  .x:hover{background:rgba(255,255,255,.08);color:var(--text)}

  /* body host */
  .stage{flex:1;min-height:0;position:relative;z-index:2;overflow:hidden}
  .scene{position:absolute;inset:0;overflow:auto;padding:16px}
  .scene::-webkit-scrollbar{width:9px}
  .scene::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--p) 22%,transparent);border-radius:8px}

  /* shared atoms */
  .eyebrow{font-family:'Space Grotesk';font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  .badge{font-family:'Space Grotesk';font-size:9.5px;letter-spacing:.04em;border-radius:999px;padding:2px 9px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .badge i{width:6px;height:6px;border-radius:50%}
  .badge.active{color:#cfeefd;border:1px solid color-mix(in srgb,var(--p) 40%,transparent);background:color-mix(in srgb,var(--p) 12%,transparent)}
  .badge.active i{background:var(--p);box-shadow:0 0 6px var(--p)}
  .badge.blocked{color:#ffd2dc;border:1px solid color-mix(in srgb,var(--stop) 48%,transparent);background:color-mix(in srgb,var(--stop) 13%,transparent)}
  .badge.blocked i{background:var(--stop);box-shadow:0 0 6px var(--stop)}
  .badge.done{color:#bff2d6;border:1px solid color-mix(in srgb,var(--ok) 42%,transparent);background:color-mix(in srgb,var(--ok) 12%,transparent)}
  .badge.done i{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .glass{border-radius:14px;border:1px solid var(--hair);position:relative;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 30%,transparent),color-mix(in srgb,var(--bg) 16%,transparent));
    backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 0 26px -10px color-mix(in srgb,var(--p) 16%,transparent),0 18px 44px -26px #000}
  .bar{height:6px;border-radius:999px;background:color-mix(in srgb,var(--bg) 50%,#0000);overflow:hidden;position:relative;border:1px solid color-mix(in srgb,var(--p) 14%,transparent)}
  .bar > i{position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:linear-gradient(90deg,color-mix(in srgb,var(--p) 70%,#fff),var(--p));box-shadow:0 0 14px -2px var(--p)}
  .bar.ok > i{background:linear-gradient(90deg,color-mix(in srgb,var(--ok) 70%,#fff),var(--ok));box-shadow:0 0 14px -2px var(--ok)}
  .bar.stop > i{background:linear-gradient(90deg,color-mix(in srgb,var(--stop) 70%,#fff),var(--stop));box-shadow:0 0 14px -2px var(--stop)}
  .tasknum{font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .pct{font-family:'Space Grotesk';font-weight:500}
  .ev{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;color:#d7e9f6;border:1px solid color-mix(in srgb,var(--a) 36%,transparent);background:color-mix(in srgb,var(--a) 8%,transparent);border-radius:7px;padding:3px 8px}
  .ev svg{width:11px;height:11px;stroke:var(--a);fill:none;stroke-width:1.9}
  .chk{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--hair);flex:0 0 auto;display:grid;place-items:center;cursor:pointer}
  .chk svg{width:10px;height:10px;stroke:var(--ok);fill:none;stroke-width:2.6;opacity:0}
  .chk.on{border-color:color-mix(in srgb,var(--ok) 55%,transparent);background:color-mix(in srgb,var(--ok) 14%,transparent)}.chk.on svg{opacity:1}

  /* ===== V1 LIST-FIRST ===== */
  .lf{display:flex;gap:14px;height:100%;min-height:0}
  .lf-list{flex:0 0 360px;display:flex;flex-direction:column;gap:8px;overflow:auto;padding-right:4px}
  .lf-row{padding:11px 12px;cursor:pointer;transition:.15s;border-radius:13px}
  .lf-row:hover{border-color:color-mix(in srgb,var(--p) 40%,transparent)}
  .lf-row.sel{border-color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 0 1px var(--p),0 0 22px -8px var(--p)}
  .lf-row .nm{display:flex;align-items:center;gap:8px;font-size:14px;color:#eaf3fb}
  .lf-row .nm b{font-weight:500}
  .lf-row .meta{display:flex;align-items:center;gap:8px;margin:9px 0 7px}
  .lf-row .tgt{font-family:'Space Grotesk';font-size:10.5px;color:var(--muted)}
  .lf-detail{flex:1;min-width:0;display:flex;flex-direction:column;padding:16px;overflow:auto}
  .lf-detail h2{font-family:'Space Grotesk';font-weight:500;font-size:21px;display:flex;align-items:center;gap:10px}
  .lf-stats{display:flex;gap:10px;margin:14px 0 4px;flex-wrap:wrap}
  .stat-card{flex:1;min-width:120px;padding:11px 13px;border-radius:12px;border:1px solid var(--hair);background:color-mix(in srgb,var(--bg) 24%,transparent)}
  .stat-card .k{font-family:'Space Grotesk';font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .stat-card .v{font-family:'Space Grotesk';font-size:20px;font-weight:500;margin-top:5px}
  .tasklist{margin-top:6px}
  .trow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--hair);font-size:13px}
  .trow:first-of-type{border-top:0}
  .trow .tt{flex:1;min-width:0}
  .trow.done .tt{color:var(--muted);text-decoration:line-through}
  .trow small{display:block;color:var(--muted);font-size:11px;margin-top:1px}

  /* ===== V2 BOARD / KANBAN ===== */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;height:100%;min-height:0}
  .lane{display:flex;flex-direction:column;min-height:0;border-radius:14px;padding:11px;border:1px solid var(--hair);background:color-mix(in srgb,var(--bg) 22%,transparent)}
  .lane-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .lane-h .cnt{margin-left:auto;font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .lane-body{overflow:auto;display:flex;flex-direction:column;gap:9px;padding-right:3px}
  .pcard{padding:11px 12px;border-radius:12px;cursor:grab}
  .pcard .nm{font-size:13.5px;color:#eaf3fb;display:flex;align-items:center;gap:7px}
  .pcard .row2{display:flex;align-items:center;justify-content:space-between;margin:9px 0 7px;font-family:'Space Grotesk';font-size:10.5px;color:var(--muted)}
  .pcard .foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  .mini{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}

  /* ===== V3 TIMELINE / GANTT ===== */
  .gantt{display:flex;flex-direction:column;height:100%;min-height:0}
  .gantt-scale{display:grid;margin-left:200px;border-bottom:1px solid var(--hair);padding-bottom:6px;margin-bottom:8px}
  .gantt-scale span{font-family:'Space Grotesk';font-size:10px;color:var(--muted);text-align:center;border-left:1px dashed color-mix(in srgb,var(--hair) 50%,transparent);padding:2px 0}
  .gantt-body{overflow:auto;display:flex;flex-direction:column;gap:11px;padding-right:4px}
  .grow{display:grid;grid-template-columns:200px 1fr;align-items:center;gap:0}
  .grow .lab{padding-right:12px}
  .grow .lab .nm{font-size:13px;color:#eaf3fb;display:flex;align-items:center;gap:7px}
  .grow .lab .sub{font-family:'Space Grotesk';font-size:10px;color:var(--muted);margin-top:3px}
  .track{position:relative;height:34px;border-radius:9px;background:color-mix(in srgb,var(--bg) 26%,transparent);border:1px solid color-mix(in srgb,var(--p) 12%,transparent)}
  .gbar{position:absolute;top:5px;bottom:5px;border-radius:7px;display:flex;align-items:center;padding:0 9px;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--p) 30%,transparent),color-mix(in srgb,var(--p) 16%,transparent));
    border:1px solid color-mix(in srgb,var(--p) 40%,transparent)}
  .gbar.stop{background:linear-gradient(160deg,color-mix(in srgb,var(--stop) 28%,transparent),color-mix(in srgb,var(--stop) 14%,transparent));border-color:color-mix(in srgb,var(--stop) 45%,transparent)}
  .gbar.done{background:linear-gradient(160deg,color-mix(in srgb,var(--ok) 26%,transparent),color-mix(in srgb,var(--ok) 13%,transparent));border-color:color-mix(in srgb,var(--ok) 42%,transparent)}
  .gbar .fillpct{position:absolute;left:0;top:0;bottom:0;background:color-mix(in srgb,var(--p) 26%,transparent);border-right:1.5px solid var(--p)}
  .gbar.stop .fillpct{background:color-mix(in srgb,var(--stop) 24%,transparent);border-right-color:var(--stop)}
  .gbar.done .fillpct{background:color-mix(in srgb,var(--ok) 24%,transparent);border-right-color:var(--ok)}
  .gbar .gl2{position:relative;z-index:2;font-family:'Space Grotesk';font-size:10.5px;color:#eef7ff;white-space:nowrap}
  .gtarget{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--a);box-shadow:0 0 8px var(--a)}
  .gtarget::after{content:"◆";position:absolute;top:-13px;left:-5px;font-size:10px;color:var(--a)}
  .today-line{position:absolute;top:-26px;bottom:0;width:1.5px;background:color-mix(in srgb,#fff 60%,transparent);z-index:3}
  .today-line::after{content:"today";position:absolute;top:-13px;left:4px;font-family:'Space Grotesk';font-size:8.5px;color:#fff;white-space:nowrap}

  /* ===== V4 PROGRESS DASHBOARD (rings) ===== */
  .dash{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;height:100%}
  .ringcard{display:flex;gap:15px;align-items:center;padding:15px}
  .ring{flex:0 0 auto;position:relative;width:96px;height:96px}
  .ring svg{transform:rotate(-90deg)}
  .ring .ct{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;text-align:center}
  .ring .ct b{font-family:'Space Grotesk';font-size:23px;font-weight:500;line-height:1}
  .ring .ct small{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .ringcard .info{flex:1;min-width:0}
  .ringcard .info h4{font-family:'Space Grotesk';font-weight:500;font-size:15px;display:flex;align-items:center;gap:8px}
  .miles{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .mile{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#cfe1ee}
  .mile .d{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--muted);flex:0 0 auto}
  .mile.done .d{background:var(--ok);border-color:var(--ok);box-shadow:0 0 6px var(--ok)}
  .mile.done span{color:var(--muted);text-decoration:line-through}
  .mile .nxt{margin-left:auto;font-family:'Space Grotesk';font-size:9.5px;color:var(--a)}

  /* ===== V5 SPLIT (list rail + dashboard) ===== */
  .split{display:flex;gap:14px;height:100%;min-height:0}
  .split-rail{flex:0 0 230px;display:flex;flex-direction:column;gap:7px;overflow:auto}
  .rail-row{padding:9px 11px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:.14s}
  .rail-row:hover{background:color-mix(in srgb,var(--p) 7%,transparent)}
  .rail-row.sel{border-color:color-mix(in srgb,var(--p) 40%,transparent);background:color-mix(in srgb,var(--p) 12%,transparent)}
  .rail-row .rn{font-size:13px;color:#eaf3fb;display:flex;align-items:center;gap:7px}
  .rail-row .rp{display:flex;align-items:center;gap:7px;margin-top:7px;font-family:'Space Grotesk';font-size:10px;color:var(--muted)}
  .split-main{flex:1;min-width:0;overflow:auto;display:flex;flex-direction:column;gap:13px}
  .hero{display:flex;gap:18px;align-items:center;padding:16px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:13px}

  /* ===== V7 EDITORIAL ===== */
  .edi{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:0}
  .edi-proj{padding:22px 4px;border-bottom:1px solid var(--hair)}
  .edi-proj:last-child{border-bottom:0}
  .edi-proj .top2{display:flex;align-items:baseline;gap:12px}
  .edi-proj h2{font-family:'Space Grotesk';font-weight:400;font-size:25px;letter-spacing:-.01em}
  .edi-proj .pn{margin-left:auto;font-family:'Space Grotesk';font-size:13px;color:var(--muted)}
  .edi-proj .line{height:2px;background:color-mix(in srgb,var(--p) 16%,transparent);margin:14px 0;position:relative;border-radius:2px}
  .edi-proj .line > i{position:absolute;left:0;top:0;bottom:0;background:var(--p);box-shadow:0 0 12px var(--p);border-radius:2px}
  .edi-proj .line.ok > i{background:var(--ok);box-shadow:0 0 12px var(--ok)}
  .edi-proj .line.stop > i{background:var(--stop);box-shadow:0 0 12px var(--stop)}
  .edi-proj .det{display:flex;gap:22px;color:var(--muted);font-size:12.5px;flex-wrap:wrap}
  .edi-proj .det b{color:#dceaf4;font-weight:500}

  /* ===== V8 COMPACT TABLE ===== */
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl thead th{font-family:'Space Grotesk';font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:left;padding:7px 10px;border-bottom:1px solid var(--hair);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 60%,transparent);backdrop-filter:blur(6px)}
  .tbl tbody td{padding:8px 10px;border-bottom:1px solid color-mix(in srgb,var(--hair) 55%,transparent)}
  .tbl tbody tr:hover{background:color-mix(in srgb,var(--p) 6%,transparent)}
  .tbl .cnm{color:#eaf3fb;display:flex;align-items:center;gap:7px}
  .tbl .cbar{display:flex;align-items:center;gap:8px;min-width:150px}
  .tbl .cbar .bar{flex:1}

  /* ===== V9 SPOTLIGHT (one big + strip) ===== */
  .spot{display:flex;flex-direction:column;gap:13px;height:100%;min-height:0}
  .spot-hero{display:flex;gap:20px;padding:18px;align-items:stretch}
  .spot-hero .left{flex:0 0 200px;display:flex;flex-direction:column;justify-content:center;gap:12px}
  .spot-hero .right{flex:1;min-width:0;display:flex;flex-direction:column}
  .spot-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
  .spot-strip .mc{flex:0 0 200px;padding:12px;border-radius:12px;cursor:pointer}
  .spot-strip .mc.sel{box-shadow:0 0 0 1px var(--p),0 0 22px -10px var(--p)}
  .big-ring{position:relative;width:150px;height:150px;align-self:center}
  .big-ring svg{transform:rotate(-90deg)}
  .big-ring .ct{position:absolute;inset:0;display:grid;place-items:center}
  .big-ring .ct b{font-family:'Space Grotesk';font-size:38px;font-weight:500}

  /* ===== V10 ROOMY CARDS ===== */
  .roomy{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
  .rcard{padding:18px}
  .rcard h3{font-family:'Space Grotesk';font-weight:500;font-size:17px;display:flex;align-items:center;gap:9px}
  .rcard .barwrap{display:flex;align-items:center;gap:12px;margin:16px 0}
  .rcard .barwrap .bar{flex:1;height:9px}
  .rcard .barwrap b{font-family:'Space Grotesk';font-size:18px;font-weight:500}
  .rcard .tasks2{display:flex;flex-direction:column;gap:7px;margin-top:4px}
  .rcard .t2{display:flex;align-items:center;gap:9px;font-size:12.5px}
  .rcard .t2.done span{color:var(--muted);text-decoration:line-through}
  .rcard .rfoot{display:flex;align-items:center;gap:9px;margin-top:15px;padding-top:13px;border-top:1px solid var(--hair);flex-wrap:wrap}

  /* ===== V11 SWIMLANE TIMELINE (status rows + time) ===== */
  .swim{display:flex;flex-direction:column;gap:0;height:100%;min-height:0;overflow:auto}
  .swim-grp{margin-bottom:6px}
  .swim-grp > .gh{display:flex;align-items:center;gap:8px;padding:8px 0 8px 2px;position:sticky;top:0;z-index:2;background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 60%,transparent),transparent)}
  .swim-row{display:grid;grid-template-columns:170px 1fr;align-items:center;gap:0;padding:5px 0}
  .swim-row .lab{font-size:12.5px;color:#eaf3fb;padding-right:10px;display:flex;align-items:center;gap:6px}
  .swim-track{position:relative;height:26px}
  .swim-track .gl{position:absolute;top:0;bottom:0;width:1px;border-left:1px dashed color-mix(in srgb,var(--hair) 45%,transparent)}
  .swim-bar{position:absolute;top:4px;bottom:4px;border-radius:6px;background:color-mix(in srgb,var(--p) 22%,transparent);border:1px solid color-mix(in srgb,var(--p) 38%,transparent)}
  .swim-bar.stop{background:color-mix(in srgb,var(--stop) 20%,transparent);border-color:color-mix(in srgb,var(--stop) 40%,transparent)}
  .swim-bar.done{background:color-mix(in srgb,var(--ok) 18%,transparent);border-color:color-mix(in srgb,var(--ok) 38%,transparent)}
  .swim-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--a);box-shadow:0 0 7px var(--a);z-index:3}

  /* ===== V12 STATCAP / focus column ===== */
  .focus{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;height:100%;min-height:0}
  .focus-l{display:flex;flex-direction:column;gap:12px;overflow:auto}
  .focus-r{display:flex;flex-direction:column;gap:11px;overflow:auto}
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .kpi .k{padding:13px;border-radius:12px;border:1px solid var(--hair);background:color-mix(in srgb,var(--bg) 24%,transparent);text-align:center}
  .kpi .k b{font-family:'Space Grotesk';font-size:26px;font-weight:500;display:block}
  .kpi .k small{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .feed{display:flex;flex-direction:column}
  .fitem{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--hair);font-size:12.5px}
  .fitem:first-of-type{border-top:0}
  .fitem .fd{font-family:'Space Grotesk';font-size:10px;color:var(--muted);flex:0 0 46px;padding-top:1px}

  .empty{color:var(--muted);font-size:12px;font-style:italic}

  @media (prefers-reduced-motion:reduce){:root{transition:none!important}.bg{transition:none!important}.amb-pop{transition:none!important}}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="bg" id="bg2" style="opacity:0"></div>
<div class="bg-grad"></div>

<div class="app" id="app">
  <div class="top">
    <div class="brand"><svg viewBox="0 0 32 32" fill="none" stroke="#5ec8ff" stroke-width="1.6"><circle cx="16" cy="16" r="9"/><path d="M16 4a12 12 0 0 0 0 24" stroke-linecap="round"/><circle cx="16" cy="16" r="2.3" fill="#5ec8ff" stroke="none"/></svg><b>ARTEMIS</b></div>
    <div class="crumb">Home / <b>Projects</b></div>
    <div class="sp"></div>
    <button class="ghost amb-btn" id="ambBtn" onclick="toggleAmb()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.1 5.1l2 2M16.9 16.9l2 2M18.9 5.1l-2 2M7.1 16.9l-2 2"/></svg> Ambient</button>
    <div class="stat"><span class="s"><span class="dot"></span> <span id="ambLabel">Winter·afternoon</span></span><span class="s"><span class="dot ok"></span> Connected</span></div>
    <div class="amb-pop" id="ambPop">
      <div class="amb-pop-head"><b>Ambient</b><span class="sub">season × time</span><button id="ambAuto" onclick="ambNow()">Auto · now</button></div>
      <div class="amb-grid" id="ambGrid"></div>
      <div class="amb-note">Auto-shifts with the real clock + calendar — 4 seasons × 4 time-states = 16 palettes. Dashed = draft (not yet hand-tuned). Photo + palette rotate per cell.</div>
    </div>
  </div>

  <!-- top-center variant switcher -->
  <div class="switch" id="switch"></div>

  <!-- the opened Projects card -->
  <div class="dov-scrim"></div>
  <div class="dov">
    <div class="chrome">
      <div class="ic">🗂️</div>
      <div><h3>Projects</h3></div>
      <div class="sp"></div>
      <div class="vname" id="vname">Variant <b>—</b></div>
      <button class="pill accent" title="Mockup — explores layout direction"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> new project</button>
      <div class="x" title="Back to map">✕</div>
    </div>

    <div class="stage"><div class="scene" id="scene"></div></div>
  </div>
</div>

<script>
/* ====================================================================
   Projects page — layout exploration. Today = Tue 23 Jun 2026.
   Content model: Projects -> Tasks (no Area layer). A project has:
     name, status (Active|Blocked|Done), progress% (derived from tasks),
     target date, tasks[], linked calendar events[].
   Continuous with the calendar/workspace mockups' narrative.
   ==================================================================== */
const TODAY={y:2026,m:5,d:23};            // Tue 23 Jun 2026
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STATUS={active:{cls:'active',label:'Active'},blocked:{cls:'blocked',label:'Blocked'},done:{cls:'done',label:'Done'}};

/* ---------- seed data ---------- */
const PROJECTS=[
  {id:'penang', name:'Penang weekend', status:'active', target:{y:2026,m:6,d:12},
   tasks:[
     {t:'Book flights', sub:'compare Fri eve vs Sat am', done:true},
     {t:'Confirm hotel', sub:'Georgetown, 2 nights', done:false},
     {t:'Packing list', sub:'light — humid', done:false},
     {t:'Tell landlord (away)', sub:'self-only note', done:false},
   ],
   events:[{t:'Fly to Penang', when:'12 Jul · 18:00'},{t:'Penang weekend', when:'13 Jul · return eve'}]},

  {id:'q3', name:'Q3 review', status:'active', target:{y:2026,m:5,d:30},
   tasks:[
     {t:'Pull metrics deck', done:true},
     {t:'Draft narrative', done:true},
     {t:'Self-assessment form', done:false},
     {t:'Book review slot', sub:'with Debby', done:false},
     {t:'Send for feedback', done:false},
   ],
   events:[{t:'Quarter wrap', when:'30 Jun · 11:00'},{t:'1:1 — Debby', when:'24 Jun · 10:00'}]},

  {id:'home', name:'Home / landlord', status:'blocked', target:{y:2026,m:6,d:5},
   tasks:[
     {t:'Reply to landlord', sub:'lease renewal terms', done:false},
     {t:'Get aircon serviced', sub:'blocked — awaiting quote', done:false},
     {t:'Pay SP Group bill', sub:'S$84.20', done:true},
     {t:'Renew domain', done:true},
   ],
   events:[{t:'Aircon service window', when:'TBD — held'}]},

  {id:'site', name:'Personal site refresh', status:'active', target:{y:2026,m:7,d:20},
   tasks:[
     {t:'Pick template', done:true},
     {t:'Write About copy', done:true},
     {t:'Port old posts', done:false},
     {t:'Wire contact form', done:false},
     {t:'Deploy', done:false},
   ],
   events:[]},

  {id:'spring', name:'Spring clean-out', status:'done', target:{y:2026,m:4,d:31},
   tasks:[
     {t:'Wardrobe purge', done:true},
     {t:'Donate boxes', done:true},
     {t:'Sell desk', done:true},
   ],
   events:[{t:'Donation pickup', when:'28 May · done'}]},
];

/* progress derived from task completion */
function prog(p){const n=p.tasks.length;if(!n)return 0;return Math.round(100*p.tasks.filter(t=>t.done).length/n);}
function doneN(p){return p.tasks.filter(t=>t.done).length;}
function fmtTarget(t){return `${t.d} ${MON[t.m]}`;}
function daysTo(t){const a=new Date(TODAY.y,TODAY.m,TODAY.d),b=new Date(t.y,t.m,t.d);return Math.round((b-a)/86400000);}
function relTarget(p){const d=daysTo(p.target);if(p.status==='done')return 'shipped';if(d<0)return `${-d}d overdue`;if(d===0)return 'due today';return `${d}d left`;}
function barCls(p){return p.status==='done'?'ok':p.status==='blocked'?'stop':'';}
function lineCls(p){return p.status==='done'?'ok':p.status==='blocked'?'stop':'';}
const ev=(t,when)=>`<span class="ev" title="linked calendar event"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>${t}${when?` · ${when}`:''}</span>`;
const chk=(on)=>`<span class="chk ${on?'on':''}"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></span>`;
const badge=(p)=>{const s=STATUS[p.status];return `<span class="badge ${s.cls}"><i></i>${s.label}</span>`;};

/* ring helper (SVG donut) */
function ring(pct,size,sw,colorVar){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  const col = colorVar||'var(--p)';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="color-mix(in srgb,var(--bg) 40%,#0000)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="filter:drop-shadow(0 0 6px ${col})"/>
  </svg>`;
}
function ringCol(p){return p.status==='done'?'var(--ok)':p.status==='blocked'?'var(--stop)':'var(--p)';}

/* ====================================================================
   VARIANTS  — each returns HTML string into #scene; wire() binds listeners
   ==================================================================== */
const VARIANTS=[];
function V(id,label,build,wire){VARIANTS.push({id,label,build,wire:wire||null});}

/* delegated checkbox toggling for any .chk inside the scene */
function wireChecks(scene){
  scene.querySelectorAll('.chk').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
}

/* ---- V1 LIST-FIRST (clean baseline) ---- */
V('list','List-first',()=>{
  const rows=PROJECTS.map((p,i)=>`
    <div class="lf-row glass ${i===0?'sel':''}" data-i="${i}">
      <div class="nm"><b>${p.name}</b></div>
      <div class="meta">${badge(p)}<span class="tgt" style="margin-left:auto">${fmtTarget(p.target)} · ${relTarget(p)}</span></div>
      <div class="bar ${barCls(p)}"><i style="width:${prog(p)}%"></i></div>
    </div>`).join('');
  return `<div class="lf">
    <div class="lf-list" id="lfList">${rows}</div>
    <div class="lf-detail glass" id="lfDetail"></div>
  </div>`;
},(scene)=>{
  function detail(i){
    const p=PROJECTS[i];
    document.getElementById('lfDetail').innerHTML=`
      <h2>${p.name} ${badge(p)}</h2>
      <div class="lf-stats">
        <div class="stat-card"><div class="k">Progress</div><div class="v">${prog(p)}%</div></div>
        <div class="stat-card"><div class="k">Tasks</div><div class="v">${doneN(p)}/${p.tasks.length}</div></div>
        <div class="stat-card"><div class="k">Target</div><div class="v">${fmtTarget(p.target)}</div></div>
        <div class="stat-card"><div class="k">Status</div><div class="v" style="font-size:14px;padding-top:4px">${relTarget(p)}</div></div>
      </div>
      <div class="bar ${barCls(p)}" style="margin:6px 0 16px"><i style="width:${prog(p)}%"></i></div>
      <div class="eyebrow">Tasks</div>
      <div class="tasklist">${p.tasks.map(t=>`
        <div class="trow ${t.done?'done':''}">${chk(t.done)}<div class="tt">${t.t}${t.sub?`<small>${t.sub}</small>`:''}</div></div>`).join('')}</div>
      ${p.events.length?`<div class="eyebrow" style="margin-top:16px">Linked events</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${p.events.map(e=>ev(e.t,e.when)).join('')}</div>`:''}`;
    wireChecks(document.getElementById('lfDetail'));
  }
  scene.querySelectorAll('.lf-row').forEach(r=>r.addEventListener('click',()=>{
    scene.querySelectorAll('.lf-row').forEach(x=>x.classList.remove('sel'));
    r.classList.add('sel'); detail(+r.dataset.i);
  }));
  detail(0);
});

/* ---- V2 BOARD / KANBAN ---- */
V('board','Board',()=>{
  const lanes=[['active','Active'],['blocked','Blocked'],['done','Done']];
  return `<div class="board">${lanes.map(([st,lbl])=>{
    const ps=PROJECTS.filter(p=>p.status===st);
    return `<div class="lane">
      <div class="lane-h">${badge({status:st})}<span class="cnt">${ps.length}</span></div>
      <div class="lane-body">${ps.map(p=>`
        <div class="pcard glass">
          <div class="nm">${p.name}</div>
          <div class="row2"><span>${fmtTarget(p.target)}</span><span class="pct">${prog(p)}%</span></div>
          <div class="bar ${barCls(p)}"><i style="width:${prog(p)}%"></i></div>
          <div class="foot">
            <span class="mini">✓ ${doneN(p)}/${p.tasks.length}</span>
            <span class="mini">⏳ ${relTarget(p)}</span>
            ${p.events.length?`<span class="mini">📅 ${p.events.length}</span>`:''}
          </div>
        </div>`).join('')||'<div class="empty">No projects.</div>'}</div>
    </div>`;
  }).join('')}</div>`;
});

/* ---- V3 TIMELINE / GANTT ---- */
V('gantt','Timeline',()=>{
  // window: 24 May .. 25 Jul 2026 (62 days)
  const start=new Date(2026,4,24), end=new Date(2026,6,25);
  const span=(end-start)/86400000;
  const pos=(dt)=>Math.max(0,Math.min(100,100*((dt-start)/86400000)/span));
  const todayPos=pos(new Date(TODAY.y,TODAY.m,TODAY.d));
  // each project bar: kickoff (assume target-N days) .. target
  const months=[['Jun',new Date(2026,5,1)],['Jul',new Date(2026,6,1)]];
  const scale=`<div class="gantt-scale" style="grid-template-columns:repeat(${months.length+1},1fr)">
    <span style="border-left:0">Late May</span>${months.map(([m,dt])=>`<span>${m}</span>`).join('')}</div>`;
  const rows=PROJECTS.map(p=>{
    const tgt=new Date(p.target.y,p.target.m,p.target.d);
    const kick=new Date(tgt); kick.setDate(tgt.getDate()-(28+p.tasks.length*3));
    const L=pos(kick), R=pos(tgt), W=Math.max(6,R-L);
    return `<div class="grow">
      <div class="lab"><div class="nm">${p.name} ${badge(p)}</div><div class="sub">${prog(p)}% · ${relTarget(p)}</div></div>
      <div class="track">
        <div class="gbar ${barCls(p)==='ok'?'done':barCls(p)==='stop'?'stop':''}" style="left:${L}%;width:${W}%">
          <div class="fillpct" style="width:${prog(p)}%"></div>
          <span class="gl2">${prog(p)}%</span>
        </div>
        <div class="gtarget" style="left:${R}%" title="target ${fmtTarget(p.target)}"></div>
      </div>
    </div>`;
  }).join('');
  return `<div class="gantt">${scale}
    <div class="gantt-body" style="position:relative">
      <div class="today-line" style="left:calc(200px + ${todayPos}% * (100% - 200px) / 100)"></div>
      ${rows}
    </div></div>`;
});

/* ---- V4 PROGRESS DASHBOARD (rings + milestones) ---- */
V('dash','Dashboard',()=>{
  return `<div class="dash">${PROJECTS.map(p=>{
    const col=ringCol(p);
    const miles=p.tasks.slice(0,4);
    return `<div class="ringcard glass">
      <div class="ring">${ring(prog(p),96,9,col)}<div class="ct"><b>${prog(p)}</b><small>percent</small></div></div>
      <div class="info">
        <h4>${p.name} ${badge(p)}</h4>
        <div style="font-family:'Space Grotesk';font-size:10.5px;color:var(--muted);margin-top:4px">${fmtTarget(p.target)} · ${relTarget(p)}</div>
        <div class="miles">${miles.map(t=>`<div class="mile ${t.done?'done':''}"><span class="d"></span><span>${t.t}</span></div>`).join('')}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
});

/* ---- V5 SPLIT (rail + dashboard detail) ---- */
V('split','Rail + detail',()=>{
  const rail=PROJECTS.map((p,i)=>`
    <div class="rail-row ${i===0?'sel':''}" data-i="${i}">
      <div class="rn">${p.name}</div>
      <div class="rp">${badge(p)}<span style="margin-left:auto">${prog(p)}%</span></div>
      <div class="bar ${barCls(p)}" style="margin-top:7px;height:4px"><i style="width:${prog(p)}%"></i></div>
    </div>`).join('');
  return `<div class="split">
    <div class="split-rail">${rail}</div>
    <div class="split-main" id="splitMain"></div>
  </div>`;
},(scene)=>{
  function detail(i){
    const p=PROJECTS[i], col=ringCol(p);
    document.getElementById('splitMain').innerHTML=`
      <div class="hero glass">
        <div class="ring" style="width:108px;height:108px">${ring(prog(p),108,10,col)}<div class="ct"><b>${prog(p)}</b><small>done</small></div></div>
        <div style="flex:1;min-width:0">
          <h2 style="font-family:'Space Grotesk';font-weight:500;font-size:22px;display:flex;gap:10px;align-items:center">${p.name} ${badge(p)}</h2>
          <div style="display:flex;gap:18px;margin-top:10px;font-family:'Space Grotesk';font-size:12px;color:var(--muted)">
            <span>Target <b style="color:#dceaf4">${fmtTarget(p.target)}</b></span>
            <span><b style="color:#dceaf4">${relTarget(p)}</b></span>
            <span>Tasks <b style="color:#dceaf4">${doneN(p)}/${p.tasks.length}</b></span>
          </div>
        </div>
      </div>
      <div class="twocol">
        <div class="glass" style="padding:14px">
          <div class="eyebrow">Tasks</div>
          ${p.tasks.map(t=>`<div class="trow ${t.done?'done':''}">${chk(t.done)}<div class="tt">${t.t}${t.sub?`<small>${t.sub}</small>`:''}</div></div>`).join('')}
        </div>
        <div class="glass" style="padding:14px">
          <div class="eyebrow">Linked events</div>
          ${p.events.length?p.events.map(e=>`<div class="trow"><div class="tt">${e.t}<small>${e.when}</small></div></div>`).join(''):'<div class="empty">No linked events.</div>'}
        </div>
      </div>`;
    wireChecks(document.getElementById('splitMain'));
  }
  scene.querySelectorAll('.rail-row').forEach(r=>r.addEventListener('click',()=>{
    scene.querySelectorAll('.rail-row').forEach(x=>x.classList.remove('sel'));
    r.classList.add('sel'); detail(+r.dataset.i);
  }));
  detail(0);
});

/* ---- V6 COMPACT TABLE (dense) ---- */
V('table','Compact table',()=>{
  return `<div class="glass" style="padding:4px 0">
    <table class="tbl">
      <thead><tr><th>Project</th><th>Status</th><th style="width:200px">Progress</th><th>Tasks</th><th>Target</th><th>When</th><th>Events</th></tr></thead>
      <tbody>${PROJECTS.map(p=>`
        <tr>
          <td><div class="cnm">${p.name}</div></td>
          <td>${badge(p)}</td>
          <td><div class="cbar"><div class="bar ${barCls(p)}"><i style="width:${prog(p)}%"></i></div><span class="pct" style="font-size:11px;color:var(--muted)">${prog(p)}%</span></div></td>
          <td class="tasknum">${doneN(p)}/${p.tasks.length}</td>
          <td style="font-family:'Space Grotesk';font-size:11.5px">${fmtTarget(p.target)}</td>
          <td style="font-family:'Space Grotesk';font-size:11px;color:var(--muted)">${relTarget(p)}</td>
          <td style="font-family:'Space Grotesk';font-size:11px;color:var(--muted)">${p.events.length||'—'}</td>
        </tr>`).join('')}</tbody>
    </table>
  </div>`;
});

/* ---- V7 EDITORIAL (low-chrome) ---- */
V('editorial','Editorial',()=>{
  return `<div class="edi">${PROJECTS.map(p=>`
    <div class="edi-proj">
      <div class="top2"><h2>${p.name}</h2><span class="pn">${prog(p)}%</span></div>
      <div class="line ${lineCls(p)}"><i style="width:${prog(p)}%"></i></div>
      <div class="det">
        <span>${STATUS[p.status].label}</span>
        <span>Target <b>${fmtTarget(p.target)}</b> · ${relTarget(p)}</span>
        <span><b>${doneN(p)}</b> of ${p.tasks.length} tasks</span>
        ${p.events.length?`<span><b>${p.events.length}</b> linked event${p.events.length>1?'s':''}</span>`:''}
      </div>
    </div>`).join('')}</div>`;
});

/* ---- V8 SPOTLIGHT (one hero + strip) ---- */
V('spotlight','Spotlight',()=>{
  const strip=PROJECTS.map((p,i)=>`
    <div class="mc glass ${i===0?'sel':''}" data-i="${i}">
      <div style="font-size:12.5px;color:#eaf3fb;margin-bottom:8px">${p.name}</div>
      <div class="bar ${barCls(p)}" style="height:5px"><i style="width:${prog(p)}%"></i></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-family:'Space Grotesk';font-size:10px;color:var(--muted)">
        <span>${prog(p)}%</span><span>${relTarget(p)}</span></div>
    </div>`).join('');
  return `<div class="spot">
    <div class="spot-hero glass" id="spotHero"></div>
    <div class="spot-strip" id="spotStrip">${strip}</div>
  </div>`;
},(scene)=>{
  function hero(i){
    const p=PROJECTS[i], col=ringCol(p);
    document.getElementById('spotHero').innerHTML=`
      <div class="left">
        <div class="big-ring">${ring(prog(p),150,12,col)}<div class="ct"><b>${prog(p)}</b></div></div>
        <div style="text-align:center">${badge(p)}</div>
      </div>
      <div class="right">
        <h2 style="font-family:'Space Grotesk';font-weight:500;font-size:24px">${p.name}</h2>
        <div style="font-family:'Space Grotesk';font-size:12px;color:var(--muted);margin:6px 0 14px">Target ${fmtTarget(p.target)} · ${relTarget(p)} · ${doneN(p)}/${p.tasks.length} tasks</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 18px">
          ${p.tasks.map(t=>`<div class="trow ${t.done?'done':''}" style="padding:5px 0">${chk(t.done)}<div class="tt" style="font-size:12.5px">${t.t}</div></div>`).join('')}
        </div>
        ${p.events.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:13px">${p.events.map(e=>ev(e.t,e.when)).join('')}</div>`:''}
      </div>`;
    wireChecks(document.getElementById('spotHero'));
  }
  scene.querySelectorAll('.mc').forEach(c=>c.addEventListener('click',()=>{
    scene.querySelectorAll('.mc').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel'); hero(+c.dataset.i);
  }));
  hero(0);
});

/* ---- V9 ROOMY CARDS ---- */
V('roomy','Roomy cards',()=>{
  return `<div class="roomy">${PROJECTS.map(p=>`
    <div class="rcard glass">
      <h3>${p.name} ${badge(p)}</h3>
      <div class="barwrap"><div class="bar ${barCls(p)}"><i style="width:${prog(p)}%"></i></div><b>${prog(p)}%</b></div>
      <div class="tasks2">${p.tasks.slice(0,4).map(t=>`<div class="t2 ${t.done?'done':''}">${chk(t.done)}<span>${t.t}</span></div>`).join('')}
        ${p.tasks.length>4?`<div class="tasknum" style="padding-left:25px">+${p.tasks.length-4} more</div>`:''}</div>
      <div class="rfoot">
        <span class="tasknum">🎯 ${fmtTarget(p.target)} · ${relTarget(p)}</span>
        ${p.events.length?p.events.map(e=>ev(e.t)).join(''):''}
      </div>
    </div>`).join('')}</div>`;
});

/* ---- V10 SWIMLANE TIMELINE (status groups + time bars) ---- */
V('swim','Swimlanes',()=>{
  const start=new Date(2026,4,24), end=new Date(2026,6,25), spanD=(end-start)/86400000;
  const pos=(dt)=>Math.max(0,Math.min(100,100*((dt-start)/86400000)/spanD));
  const todayPos=pos(new Date(TODAY.y,TODAY.m,TODAY.d));
  const gridlines=['Jun','Jul'].map((m,i)=>`<div class="gl" style="left:${pos(new Date(2026,5+i,1))}%"></div>`).join('');
  const groups=[['active','Active'],['blocked','Blocked'],['done','Done']];
  return `<div class="swim">${groups.map(([st,lbl])=>{
    const ps=PROJECTS.filter(p=>p.status===st);
    if(!ps.length)return '';
    return `<div class="swim-grp">
      <div class="gh">${badge({status:st})}<span class="tasknum">${ps.length}</span></div>
      ${ps.map(p=>{
        const tgt=new Date(p.target.y,p.target.m,p.target.d);
        const kick=new Date(tgt); kick.setDate(tgt.getDate()-(28+p.tasks.length*3));
        const L=pos(kick), R=pos(tgt);
        return `<div class="swim-row">
          <div class="lab">${p.name}</div>
          <div class="swim-track">${gridlines}
            <div class="swim-bar ${barCls(p)==='ok'?'done':barCls(p)==='stop'?'stop':''}" style="left:${L}%;width:${Math.max(4,R-L)}%"></div>
            <div class="swim-dot" style="left:${R}%" title="target ${fmtTarget(p.target)}"></div>
            <div class="gl" style="left:${todayPos}%;border-left:1px solid color-mix(in srgb,#fff 50%,transparent)"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}</div>`;
});

/* ---- V11 FOCUS COLUMN (KPIs + active focus + feed) ---- */
V('focus','Focus + KPIs',()=>{
  const active=PROJECTS.filter(p=>p.status==='active').length;
  const blocked=PROJECTS.filter(p=>p.status==='blocked').length;
  const avg=Math.round(PROJECTS.reduce((s,p)=>s+prog(p),0)/PROJECTS.length);
  const focusP=PROJECTS.find(p=>p.id==='penang');
  const col=ringCol(focusP);
  // build a simple "what's next" feed = next undone task per active/blocked project
  const feed=PROJECTS.filter(p=>p.status!=='done').map(p=>{
    const next=p.tasks.find(t=>!t.done);
    return {proj:p, task:next};
  }).filter(x=>x.task);
  return `<div class="focus">
    <div class="focus-l">
      <div class="kpi">
        <div class="k"><b>${active}</b><small>Active</small></div>
        <div class="k"><b style="color:var(--stop)">${blocked}</b><small>Blocked</small></div>
        <div class="k"><b>${avg}%</b><small>Avg progress</small></div>
      </div>
      <div class="glass hero" style="padding:16px">
        <div class="ring" style="width:104px;height:104px">${ring(prog(focusP),104,10,col)}<div class="ct"><b>${prog(focusP)}</b><small>done</small></div></div>
        <div style="flex:1;min-width:0">
          <div class="eyebrow" style="margin-bottom:5px">Nearest target</div>
          <h2 style="font-family:'Space Grotesk';font-weight:500;font-size:20px;display:flex;gap:9px;align-items:center">${focusP.name} ${badge(focusP)}</h2>
          <div style="font-family:'Space Grotesk';font-size:12px;color:var(--muted);margin-top:7px">${fmtTarget(focusP.target)} · ${relTarget(focusP)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:11px">${focusP.events.map(e=>ev(e.t,e.when)).join('')}</div>
        </div>
      </div>
      <div class="glass" style="padding:14px">
        <div class="eyebrow">${focusP.name} — tasks</div>
        ${focusP.tasks.map(t=>`<div class="trow ${t.done?'done':''}">${chk(t.done)}<div class="tt">${t.t}${t.sub?`<small>${t.sub}</small>`:''}</div></div>`).join('')}
      </div>
    </div>
    <div class="focus-r">
      <div class="glass" style="padding:14px">
        <div class="eyebrow">Up next — across projects</div>
        <div class="feed">${feed.map(f=>`
          <div class="fitem"><span class="fd">${relTarget(f.proj)}</span>
            <div style="flex:1;min-width:0"><div style="color:#e7f1fa">${f.task.t}</div>
              <small style="color:var(--muted);font-size:11px">${f.proj.name}${f.proj.status==='blocked'?' · blocked':''}</small></div>
          </div>`).join('')}</div>
      </div>
      <div class="glass" style="padding:14px">
        <div class="eyebrow">All projects</div>
        ${PROJECTS.map(p=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--hair)">
          <span style="flex:1;font-size:12.5px;color:#dceaf4">${p.name}</span>
          <div class="bar ${barCls(p)}" style="width:64px;height:4px"><i style="width:${prog(p)}%"></i></div>
          <span class="tasknum" style="width:34px;text-align:right">${prog(p)}%</span></div>`).join('')}
      </div>
    </div>
  </div>`;
});

/* ====================================================================
   switcher + render orchestration (clean up per-variant listeners on switch)
   ==================================================================== */
const scene=document.getElementById('scene');
let cur=0;
function render(i){
  cur=i;
  const v=VARIANTS[i];
  scene.innerHTML='';                                  // drops old nodes + their listeners (GC)
  scene.innerHTML=v.build();
  if(v.wire)v.wire(scene);
  // every variant: wire any stray top-level checkboxes once
  wireChecks(scene);
  document.querySelectorAll('#switch button').forEach((b,bi)=>b.classList.toggle('on',bi===i));
  document.getElementById('vname').innerHTML=`Variant <b>${v.label}</b>`;
}
(function(){const sw=document.getElementById('switch');
  sw.innerHTML=VARIANTS.map((v,i)=>`<button data-i="${i}"><span class="no">${String(i+1).padStart(2,'0')}</span>${v.label}</button>`).join('');
  sw.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>render(+b.dataset.i)));
})();

/* ====================================================================
   AMBIENT THEMING (copied from calendar-detail) — 4 seasons × 4 times
   ==================================================================== */
const bg=document.getElementById('bg'), bg2=document.getElementById('bg2');
bg.style.zIndex='1'; bg2.style.zIndex='0';
let _front=bg;
function setPhoto(url,bright){
  const inc=_front===bg?bg2:bg;
  inc.style.transition='none'; inc.style.opacity='0';
  inc.style.backgroundImage=`url(${url})`;
  inc.style.filter=`brightness(${bright}) saturate(1.08) blur(1.5px)`;
  inc.style.zIndex='2';
  void inc.offsetWidth;
  inc.style.transition='opacity .8s ease';
  inc.style.opacity='1';
  _front.style.zIndex='1'; _front=inc;
}
const SEASONS=['Spring','Summer','Autumn','Winter'], TIMES=['morning','afternoon','evening','night'];
const DIM={morning:.70,afternoon:.80,evening:.60,night:.40};
const PAL={
  'Spring|morning':{bg:'#08120e',p:'#8fecb8',a:'#ffc2a6',v:1}, 'Spring|afternoon':{bg:'#0a1612',p:'#5fee9c',a:'#84d2ff',v:1},
  'Spring|evening':{bg:'#0a0c0d',p:'#f2b487',a:'#93d59a',v:1}, 'Spring|night':{bg:'#05080f',p:'#5aa6d0',a:'#8fd0a8',v:0},
  'Summer|morning':{bg:'#0e0a10',p:'#ff9e6e',a:'#8fb0ff',v:0}, 'Summer|afternoon':{bg:'#11140a',p:'#ffd64a',a:'#58c4f2',v:0},
  'Summer|evening':{bg:'#0d0908',p:'#ff9f4a',a:'#ff5e8a',v:0}, 'Summer|night':{bg:'#06080f',p:'#4f9fc8',a:'#e3a06f',v:0},
  'Autumn|morning':{bg:'#0f0c08',p:'#e3b572',a:'#93b39c',v:1}, 'Autumn|afternoon':{bg:'#100a05',p:'#f0a23f',a:'#c2552b',v:1},
  'Autumn|evening':{bg:'#0d0606',p:'#ff7338',a:'#9a5ab0',v:1}, 'Autumn|night':{bg:'#0a0707',p:'#a06a44',a:'#6a5a7a',v:0},
  'Winter|morning':{bg:'#080d14',p:'#abe0ff',a:'#ffc7a6',v:1}, 'Winter|afternoon':{bg:'#060c14',p:'#58c6ff',a:'#fff0d8',v:1},
  'Winter|evening':{bg:'#07091a',p:'#8aa6ff',a:'#ffb479',v:1}, 'Winter|night':{bg:'#05070e',p:'#5a76b0',a:'#b88a5c',v:0}
};
let amb={season:'Winter',time:'afternoon'};
function setAmbient(season,time){
  amb={season,time}; const c=PAL[season+'|'+time], R=document.documentElement.style;
  R.setProperty('--bg',c.bg); R.setProperty('--p',c.p); R.setProperty('--a',c.a);
  setPhoto(`https://picsum.photos/seed/artemis-${season.toLowerCase()}-${time}/1920/1080`,DIM[time]);
  document.getElementById('ambLabel').textContent=`${season}·${time}`;
  document.querySelectorAll('.amb-cell').forEach(b=>b.classList.toggle('act',b.dataset.s===season&&b.dataset.t===time));
}
(function(){const g=document.getElementById('ambGrid');
  g.innerHTML='<span></span>'+TIMES.map(t=>`<span class="amb-h">${t}</span>`).join('');
  SEASONS.forEach(s=>{g.insertAdjacentHTML('beforeend',`<span class="amb-rh">${s}</span>`);
    TIMES.forEach(t=>{const c=PAL[s+'|'+t];
      g.insertAdjacentHTML('beforeend',`<button class="amb-cell${c.v?'':' draft'}" data-s="${s}" data-t="${t}" title="${s} · ${t}${c.v?'':' · draft'}" style="background:${c.bg}"><i style="background:${c.p}"></i><i style="background:${c.a}"></i></button>`);});});
  g.querySelectorAll('.amb-cell').forEach(b=>b.onclick=()=>setAmbient(b.dataset.s,b.dataset.t));})();
function toggleAmb(){document.getElementById('ambPop').classList.toggle('on');}
function ambNow(){const d=new Date(), m=d.getMonth(), h=d.getHours()+d.getMinutes()/60;
  const season=['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'][m];
  const time=(h>=23.5||h<7.25)?'night':h<12?'morning':h<17?'afternoon':'evening';
  setAmbient(season,time);}
document.addEventListener('click',e=>{const p=document.getElementById('ambPop');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('#ambBtn'))p.classList.remove('on');});
addEventListener('keydown',e=>{if(e.key==='Escape'){const p=document.getElementById('ambPop');if(p.classList.contains('on'))p.classList.remove('on');}});

/* ---------- boot ---------- */
render(0);
setAmbient('Winter','afternoon');
</script>
