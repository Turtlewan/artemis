<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artemis — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* register ambient tokens as typed colours so they interpolate (smooth cross-fade) */
  @property --bg{syntax:"<color>";inherits:true;initial-value:#060c14}
  @property --p{syntax:"<color>";inherits:true;initial-value:#58c6ff}
  @property --a{syntax:"<color>";inherits:true;initial-value:#fff0d8}
  :root{
    --bg:#060c14; --p:#58c6ff; --a:#fff0d8;                 /* ambient — set by the resolver (default Winter·afternoon) */
    --ok:#67e0a3; --text:#eef7ff; --muted:#a8bccb;
    --glass:color-mix(in srgb,var(--bg) 33%,transparent); --glass2:color-mix(in srgb,var(--bg) 19%,transparent);
    --hair:color-mix(in srgb,var(--p) 22%,transparent);
    font-synthesis:none;
    transition:--bg .8s cubic-bezier(.4,0,.2,1),--p .8s cubic-bezier(.4,0,.2,1),--a .8s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{color:var(--text);font-family:'Inter',system-ui,'Segoe UI',sans-serif;height:100%;background:var(--bg)}
  .bg{position:fixed;inset:-40px;z-index:0;background-size:cover;background-position:center;filter:brightness(.66) saturate(1.08) blur(1.5px);transition:opacity .8s ease}
  .bg-grad{position:fixed;inset:0;z-index:5;pointer-events:none;background:
    radial-gradient(1200px 820px at 50% -8%, rgba(40,90,120,.16), transparent 60%),
    linear-gradient(180deg, rgba(7,13,22,.20), rgba(7,13,22,.46) 72%, rgba(7,13,22,.62))}
  .app{position:fixed;inset:0;z-index:6}

  /* top bar (ambient toggle lives here) */
  .top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:13px;padding:13px 20px;z-index:50}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:23px;height:23px;filter:drop-shadow(0 0 6px var(--p))}
  .brand b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.2em;font-size:12.5px}
  .crumb{font-family:'Space Grotesk';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding-left:13px;border-left:1px solid var(--hair)}
  .crumb b{color:var(--p);font-weight:500}
  .top .sp{flex:1}
  .ghost{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);backdrop-filter:blur(8px);transition:.16s}
  .ghost:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .ghost svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}
  .amb-pop{position:absolute;top:50px;right:20px;width:344px;z-index:60;padding:13px;border-radius:16px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 60%,transparent),color-mix(in srgb,var(--bg) 44%,transparent));
    backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--hair);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05),inset 0 0 26px -6px color-mix(in srgb,var(--p) 18%,transparent),0 2px 6px -2px rgba(0,0,0,.4),0 32px 80px -28px #000,0 0 40px -16px var(--p);opacity:0;transform:translateY(-8px);pointer-events:none;transition:.2s}
  .amb-pop.on{opacity:1;transform:none;pointer-events:auto}
  .amb-pop-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .amb-pop-head b{font-family:'Space Grotesk';font-weight:500;letter-spacing:.16em;font-size:11px;text-transform:uppercase}
  .amb-pop-head .sub{font-size:10px;color:var(--muted)}
  .amb-pop-head #ambAuto{margin-left:auto;font-family:'Space Grotesk';font-size:10.5px;color:#eaf7ff;border:1px solid color-mix(in srgb,var(--p) 38%,transparent);border-radius:7px;padding:4px 9px;cursor:pointer;background:color-mix(in srgb,var(--p) 14%,transparent)}
  .amb-pop-head #ambAuto:hover{background:color-mix(in srgb,var(--p) 24%,transparent)}
  .amb-grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:5px;align-items:center}
  .amb-h{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center}
  .amb-rh{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);padding-right:5px;text-align:right}
  .amb-cell{position:relative;height:30px;border-radius:8px;border:1px solid var(--hair);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden;transition:.14s}
  .amb-cell:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--p) 45%,transparent)}
  .amb-cell.draft{border-style:dashed;opacity:.85}
  .amb-cell i{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px -1px rgba(0,0,0,.6)}
  .amb-cell.act{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 16px -4px var(--p)}
  .amb-note{margin-top:11px;font-size:10px;line-height:1.45;color:var(--muted)}
  .stat{display:flex;align-items:center;gap:11px}
  .s{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';font-size:11px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 7px var(--p)}
  .dot.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}

  /* ---------- the opened Calendar detail panel ---------- */
  .dov-scrim{position:fixed;inset:0;z-index:44;background:rgba(3,7,13,.20)}
  .dov{position:fixed;z-index:45;left:50%;top:53%;transform:translate(-50%,-50%);
    width:980px;max-width:94vw;height:640px;max-height:84vh;
    display:flex;flex-direction:column;border-radius:18px;overflow:hidden;
    background:linear-gradient(160deg,color-mix(in srgb,var(--bg) 46%,transparent),color-mix(in srgb,var(--bg) 32%,transparent));
    backdrop-filter:blur(32px) saturate(150%);-webkit-backdrop-filter:blur(32px) saturate(150%);
    border:1px solid color-mix(in srgb,var(--p) 34%,transparent);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.24),inset 0 -1px 0 rgba(255,255,255,.06),inset 0 0 40px -10px color-mix(in srgb,var(--p) 16%,transparent),0 4px 12px -3px rgba(0,0,0,.5),0 50px 130px -28px #000,0 0 64px -16px var(--p)}
  .dov::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.32;background:linear-gradient(162deg,rgba(255,255,255,.12),transparent 30%);mix-blend-mode:screen}

  /* header row */
  .chrome{display:flex;align-items:center;gap:11px;padding:13px 18px;border-bottom:1px solid var(--hair);position:relative;z-index:2;flex:0 0 auto}
  .chrome .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-size:16px;background:color-mix(in srgb,var(--p) 12%,transparent);border:1px solid color-mix(in srgb,var(--p) 22%,transparent)}
  .chrome h3{font-family:'Space Grotesk';font-weight:500;font-size:16px;letter-spacing:.01em}
  .chrome .sp{flex:1}
  .seg{display:flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden;background:rgba(8,14,22,.35)}
  .seg button{font-family:'Space Grotesk';font-size:11.5px;color:#cfe1ee;padding:6px 13px;cursor:pointer;border:0;background:transparent;transition:.15s}
  .seg button:hover{background:color-mix(in srgb,var(--p) 10%,transparent)}
  .seg button.on{color:#eaf7ff;background:color-mix(in srgb,var(--p) 20%,transparent);box-shadow:0 0 14px -6px var(--p) inset}
  .pill{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';font-size:11.5px;color:#dfeefb;border:1px solid var(--hair);border-radius:9px;padding:6px 11px;cursor:pointer;background:rgba(8,14,22,.35);transition:.16s}
  .pill:hover{background:color-mix(in srgb,var(--p) 12%,transparent)}
  .pill.accent{border-color:color-mix(in srgb,var(--p) 42%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 15%,transparent);box-shadow:0 0 18px -8px var(--p)}
  .pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
  .x{width:26px;height:26px;display:grid;place-items:center;border-radius:7px;cursor:pointer;color:var(--muted);font-size:13px;flex:0 0 auto}
  .x:hover{background:rgba(255,255,255,.08);color:var(--text)}

  /* body = nav rail (mini-month / week-strip) + agenda hero */
  .panes{flex:1;display:flex;min-height:0;position:relative;z-index:2;overflow:hidden}
  .rail{flex:0 0 39%;min-width:0;padding:18px 18px 16px 20px;display:flex;flex-direction:column;border-right:1px solid var(--hair);overflow:auto}
  .hero{flex:1 1 61%;min-width:0;padding:18px 22px;overflow:auto;display:flex;flex-direction:column}

  /* nav title (shared) */
  .mtitle{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .mtitle b{font-family:'Space Grotesk';font-weight:500;font-size:15px}
  .mtitle .sp{flex:1}
  .nav{width:24px;height:24px;display:grid;place-items:center;border-radius:6px;border:1px solid var(--hair);cursor:pointer;color:var(--muted);font-size:12px}
  .nav:hover{color:var(--text);background:rgba(255,255,255,.06)}

  /* ---- mini-month navigator ---- */
  .mini-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
  .mini-dow span{font-family:'Space Grotesk';font-size:8.5px;letter-spacing:.06em;color:var(--muted);text-align:center}
  .mini-dow span.we{opacity:.5}
  .mini-m{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mc{position:relative;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-size:12.5px;color:#cfe0ee;cursor:pointer;border:1px solid transparent;transition:.12s}
  .mc:hover{background:color-mix(in srgb,var(--p) 9%,transparent)}
  .mc.we{opacity:.5}.mc.out{opacity:.24}
  .mc.today{background:color-mix(in srgb,var(--p) 16%,transparent);color:#fff}
  .mc.sel{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 14px -5px var(--p)}
  .mc .pips{position:absolute;bottom:4px;display:flex;gap:2.5px}
  .mc .pip{width:4px;height:4px;border-radius:50%;background:var(--p);box-shadow:0 0 5px -1px var(--p)}
  .mc .pip.t{background:transparent;border:1px solid var(--a);box-shadow:none}
  .mc .pip.k{background:var(--a);box-shadow:0 0 5px -1px var(--a)}

  /* ---- week strip navigator (7 days of selected week) ---- */
  .wstrip{display:flex;flex-direction:column;gap:6px}
  .wsc{display:flex;align-items:center;gap:11px;border:1px solid var(--hair);border-radius:11px;padding:9px 11px;cursor:pointer;background:rgba(120,180,255,.025);transition:.13s}
  .wsc:hover{border-color:color-mix(in srgb,var(--p) 40%,transparent);background:color-mix(in srgb,var(--p) 7%,transparent)}
  .wsc.we{opacity:.6}
  .wsc.today{border-color:color-mix(in srgb,var(--p) 34%,transparent);background:color-mix(in srgb,var(--p) 11%,transparent)}
  .wsc.sel{border-color:#fff;box-shadow:0 0 0 1.5px var(--p),0 0 16px -6px var(--p)}
  .wsc .wsd{flex:0 0 46px;text-align:center}
  .wsc .wsd .dow2{font-family:'Space Grotesk';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .wsc .wsd .num{font-family:'Space Grotesk';font-weight:500;font-size:20px;color:#dceaf4;line-height:1}
  .wsc.today .wsd .num{color:#fff}
  .wsc .wsi{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .wsc .pips2{display:flex;align-items:center;gap:5px}
  .wsc .pips2 .ed{width:6px;height:6px;border-radius:50%;background:var(--p);box-shadow:0 0 6px -1px var(--p)}
  .wsc .pips2 .ed.t{background:transparent;border:1px dashed var(--a);box-shadow:none}
  .wsc .pips2 .ed.k{background:var(--a);box-shadow:0 0 5px -1px var(--a);width:5px;height:5px}
  .wsc .wsmore{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted)}
  .wsc .wsnext{font-size:11px;color:#cfe0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wsc .wsnext .tm{font-family:'Space Grotesk';color:var(--muted);font-size:10px;margin-right:5px}

  /* ---- agenda hero (selected day) ---- */
  .sidehead{display:flex;align-items:baseline;gap:9px;margin-bottom:3px}
  .sidehead b{font-family:'Space Grotesk';font-weight:500;font-size:22px}
  .sidehead .rel{font-family:'Space Grotesk';font-size:11px;color:var(--p)}
  .sidesub{font-size:12px;color:var(--muted);margin-bottom:14px}
  .eyebrow{font-family:'Space Grotesk';font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
  .eyebrow:first-of-type{margin-top:4px}
  .ev{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--hair);font-size:14px}
  .ev:first-of-type{border-top:0}
  .ev .tm{font-family:'Space Grotesk';font-size:12px;color:var(--muted);flex:0 0 46px;padding-top:1px}
  .ev .body{flex:1;min-width:0}
  .ev .ti{color:#e7f1fa}
  .ev small{display:block;color:var(--muted);font-size:11.5px;margin-top:1px}
  .ev.tent{border-left:2px dashed color-mix(in srgb,var(--a) 60%,transparent);padding-left:10px;margin-left:-2px;border-radius:0 8px 8px 0;background:color-mix(in srgb,var(--a) 5%,transparent)}
  .ev.tent .ti{color:#fff}
  .approve{display:flex;gap:7px;margin-top:8px}
  .mini-btn{font-family:'Space Grotesk';font-size:11px;border-radius:7px;padding:5px 12px;cursor:pointer;border:1px solid var(--hair);color:#cfe1ee;background:transparent;transition:.15s}
  .mini-btn:hover{background:rgba(255,255,255,.06)}
  .mini-btn.primary{border-color:color-mix(in srgb,var(--a) 50%,transparent);color:#fff;background:color-mix(in srgb,var(--a) 14%,transparent)}
  .mini-btn.primary:hover{background:color-mix(in srgb,var(--a) 24%,transparent)}
  .tag{font-family:'Space Grotesk';font-size:9.5px;color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:2px 8px;white-space:nowrap;align-self:flex-start;margin-top:2px}
  .tag.a{color:var(--a);border-color:color-mix(in srgb,var(--a) 38%,transparent)}
  .tag.held{color:var(--a);border:1px dashed color-mix(in srgb,var(--a) 45%,transparent)}
  .task{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--hair);font-size:14px}
  .task:first-of-type{border-top:0}
  .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--hair);flex:0 0 auto;display:grid;place-items:center;margin-top:1px;cursor:pointer}
  .chk svg{width:11px;height:11px;stroke:var(--ok);fill:none;stroke-width:2.4;opacity:0}
  .chk.on{border-color:color-mix(in srgb,var(--ok) 50%,transparent)}.chk.on svg{opacity:1}
  .task .body{flex:1;min-width:0}
  .rsvp{border:1px solid var(--hair);border-radius:12px;padding:13px;margin-top:4px;background:color-mix(in srgb,var(--p) 6%,transparent)}
  .rsvp h4{font-size:13.5px;font-weight:600;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .rsvp .why{color:#bcd0de;font-size:12px;line-height:1.45;margin-top:5px}
  .rsvp .acts{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
  .chip-act{font-family:'Space Grotesk';font-size:11px;border-radius:7px;padding:5px 13px;cursor:pointer;border:1px solid color-mix(in srgb,var(--p) 45%,transparent);color:#eaf7ff;background:color-mix(in srgb,var(--p) 16%,transparent)}
  .chip-act:hover{background:color-mix(in srgb,var(--p) 26%,transparent)}
  .addev{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:14px;color:var(--muted);font-family:'Space Grotesk';font-size:12.5px;cursor:pointer}
  .addev:hover{color:#cfe1ee}
  .addev .pl{width:20px;height:20px;border-radius:6px;border:1px solid var(--hair);display:grid;place-items:center;font-size:13px}
  .empty{color:var(--muted);font-size:12.5px;padding:6px 0;font-style:italic}

  /* ---- week-at-a-glance hero (Week mode) ---- */
  .glance-day{border-top:1px solid var(--hair);padding:11px 0}
  .glance-day:first-of-type{border-top:0}
  .gd-head{display:flex;align-items:baseline;gap:9px;cursor:pointer;margin-bottom:5px}
  .gd-head .gdn{font-family:'Space Grotesk';font-weight:500;font-size:14px;color:#e7f1fa}
  .gd-head.today .gdn{color:#fff}
  .gd-head.sel .gdn{color:var(--p)}
  .gd-head .gdw{font-family:'Space Grotesk';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .gd-head .gcount{margin-left:auto;font-family:'Space Grotesk';font-size:10px;color:var(--muted)}
  .gd-head.we .gdw,.gd-head.we .gdn{opacity:.55}
  .gline{display:flex;gap:10px;font-size:12.5px;padding:3px 0;color:#cfe0ee}
  .gline .tm{font-family:'Space Grotesk';font-size:11px;color:var(--muted);flex:0 0 44px}
  .gline.tent{color:#fff}
  .gline.tent .ti::after{content:" · held";color:var(--a);font-family:'Space Grotesk';font-size:10px}
  .gline.task .ti{color:#cfe0ee}
  .gline.task .tm{color:var(--a)}
  .gd-empty{font-size:11.5px;color:var(--muted);font-style:italic;padding:2px 0 2px 54px}

  @media (prefers-reduced-motion:reduce){:root{transition:none!important}.bg{transition:none!important}.amb-pop{transition:none!important}}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="bg" id="bg2" style="opacity:0"></div>
<div class="bg-grad"></div>

<div class="app" id="app">
  <div class="top">
    <div class="brand"><svg viewBox="0 0 32 32" fill="none" stroke="#5ec8ff" stroke-width="1.6"><circle cx="16" cy="16" r="9"/><path d="M16 4a12 12 0 0 0 0 24" stroke-linecap="round"/><circle cx="16" cy="16" r="2.3" fill="#5ec8ff" stroke="none"/></svg><b>ARTEMIS</b></div>
    <div class="crumb">Home / <b>Calendar</b></div>
    <div class="sp"></div>
    <button class="ghost amb-btn" id="ambBtn" onclick="toggleAmb()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.1 5.1l2 2M16.9 16.9l2 2M18.9 5.1l-2 2M7.1 16.9l-2 2"/></svg> Ambient</button>
    <div class="stat"><span class="s"><span class="dot"></span> <span id="ambLabel">Winter·afternoon</span></span><span class="s"><span class="dot ok"></span> Connected</span></div>
    <div class="amb-pop" id="ambPop">
      <div class="amb-pop-head"><b>Ambient</b><span class="sub">season × time</span><button id="ambAuto" onclick="ambNow()">Auto · now</button></div>
      <div class="amb-grid" id="ambGrid"></div>
      <div class="amb-note">Auto-shifts with the real clock + calendar — 4 seasons × 4 time-states = 16 palettes. Dashed = draft (not yet hand-tuned). Photo + palette rotate per cell.</div>
    </div>
  </div>

  <!-- the opened Calendar card -->
  <div class="dov-scrim"></div>
  <div class="dov" id="dov">
    <div class="chrome">
      <div class="ic">📅</div>
      <div><h3>Calendar</h3></div>
      <div class="sp"></div>
      <div class="seg" id="seg">
        <button data-view="month" class="on" onclick="setView('month')">Month</button>
        <button data-view="week" onclick="setView('week')">Week</button>
      </div>
      <button class="pill" onclick="goToday()"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg> Today</button>
      <button class="pill accent" title="Artemis proposes a slot — held tentative until you approve"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg> find time</button>
      <div class="x" title="Back to map">✕</div>
    </div>
    <div class="panes">
      <div class="rail" id="railPane"><!-- mini-month or week-strip --></div>
      <div class="hero" id="heroPane"><!-- day agenda or week-at-a-glance --></div>
    </div>
  </div>
</div>

<script>
/* ====================================================================
   Calendar — canonical Agenda-primary page. Today = Tue 23 Jun 2026.
   Hero = selected-day agenda (events w/ Approve/Dismiss on held-tentatives,
   tasks-due w/ checkbox + `due` tag, RSVP w/ review→ chip).
   Rail navigator = mini-MONTH (Month mode) or WEEK-STRIP (Week mode).
   In Week mode the hero shows a week-at-a-glance agenda.
   Engine truths (same as calendar-detail.html):
     - self-only edits act inline (+ add event)
     - external-effect (RSVP/invite) → `review` tag, stages to Review
     - tentatives HELD in Artemis until approved; approving writes to Google
     - tasks shown here come from the Tasks module (due-on-day link)
   ==================================================================== */
const YEAR=2026, MONTH=5;                 // June (0-based)
const TODAY={y:2026,m:5,d:23};            // Tue 23 Jun 2026
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const key=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
function dow(y,m,d){return (new Date(y,m,d).getDay()+6)%7;}   // 0=Mon … 6=Sun
const isWE=i=>i>=5;

/* ---------- sample data (verbatim from calendar-detail.html) ---------- */
const EVENTS={
  '2026-06-23':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:12,e:13,t:'Lunch — Ashley'},
                 {type:'tent',s:14,e:15.5,t:'Focus block',sub:'proposed by Artemis · 90m'},
                 {type:'task',t:'Reply to landlord',sub:'rented flat'},
                 {type:'rsvp',s:16.5,e:17,t:'Team sync invite',sub:'from Debby · respond'} ],
  '2026-06-24':[ {type:'ev',s:10,e:11,t:'1:1 — Debby'},
                 {type:'tent',s:15,e:16,t:'Interview — candidate',sub:'tentative · awaiting confirm'} ],
  '2026-06-25':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:13,e:14,t:'Design review'} ],
  '2026-06-26':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'task',t:'Pay SP Group bill',sub:'S$84.20 · due Fri'},
                 {type:'task',t:'Call dentist'} ],
  '2026-06-29':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'tent',s:14,e:15.5,t:'Focus block',sub:'proposed · weekly'} ],
  '2026-06-30':[ {type:'ev',s:11,e:12,t:'Quarter wrap'},
                 {type:'task',t:'Draft Q3 review'} ],
  '2026-07-01':[ {type:'ev',s:9.5,e:10,t:'Standup'} ],
  '2026-07-02':[ {type:'task',t:'Book Penang flights',sub:'compare Fri eve vs Sat am'} ],
  '2026-07-03':[ {type:'ev',s:12,e:13,t:'Lunch — Ashley'} ],
  '2026-07-06':[ {type:'ev',s:9.5,e:10,t:'Standup'} ],
  '2026-07-08':[ {type:'ev',s:10,e:11,t:'1:1 — Debby'} ],
  '2026-07-10':[ {type:'task',t:'Confirm Penang hotel'} ],
  '2026-07-12':[ {type:'ev',s:18,e:20,t:'Fly to Penang',sub:'with Ashley'} ],
  '2026-07-13':[ {type:'ev',s:16,e:19,t:'Penang weekend',sub:'return Sun eve'} ],
  '2026-06-18':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'ev',s:14,e:15,t:'Catch-up — Mum'} ],
  '2026-06-19':[ {type:'ev',s:9.5,e:10,t:'Standup'},
                 {type:'task',t:'Renew domain'} ]
};
function dayItems(k){return EVENTS[k]||[];}
const fmtH=h=>{const hr=Math.floor(h),mn=Math.round((h-hr)*60);return `${hr}:${String(mn).padStart(2,'0')}`;};

/* ---------- state ---------- */
let view='month';                  // 'month' → mini-month rail + day agenda; 'week' → week-strip rail + week glance
let sel={...TODAY};

/* ---------- helpers ---------- */
function gridFrame(){
  const first=dow(YEAR,MONTH,1);
  const start=new Date(YEAR,MONTH,1-first);
  const last=new Date(YEAR,MONTH+1,0).getDate();
  return {start,rowsN:Math.ceil((first+last)/7)};
}
function cellMeta(i,start){
  const dt=new Date(start); dt.setDate(start.getDate()+i);
  const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
  return {y,m,d,col:i%7,k:key(y,m,d),out:(m!==MONTH),
    today:(y===TODAY.y&&m===TODAY.m&&d===TODAY.d),
    seld:(y===sel.y&&m===sel.m&&d===sel.d)};
}
function weekStart(){const i=dow(sel.y,sel.m,sel.d);return new Date(sel.y,sel.m,sel.d-i);}
function dayCounts(k){
  const items=dayItems(k);
  return {
    ev:items.filter(x=>x.type==='ev'||x.type==='rsvp'),
    tent:items.filter(x=>x.type==='tent'),
    task:items.filter(x=>x.type==='task')
  };
}
function wireDays(root){
  root.querySelectorAll('[data-y]').forEach(c=>c.addEventListener('click',()=>selectDay(+c.dataset.y,+c.dataset.m,+c.dataset.d)));
}

/* ====================================================================
   RAIL — mini-month (Month mode)
   ==================================================================== */
function buildMiniMonth(){
  const {start,rowsN}=gridFrame();
  let cells='';
  for(let i=0;i<rowsN*7;i++){
    const M=cellMeta(i,start), c=dayCounts(M.k);
    let pips='';
    if(c.ev.length)pips+='<span class="pip"></span>';
    if(c.tent.length)pips+='<span class="pip t"></span>';
    if(c.task.length)pips+='<span class="pip k"></span>';
    const cls=['mc',isWE(M.col)?'we':'',M.out?'out':'',M.today?'today':'',M.seld?'sel':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" data-y="${M.y}" data-m="${M.m}" data-d="${M.d}">${M.d}${pips?`<div class="pips">${pips}</div>`:''}</div>`;
  }
  return `<div class="mtitle"><div class="nav">‹</div><b>${MON[MONTH]} ${YEAR}</b><div class="nav">›</div><div class="sp"></div></div>
    <div class="mini-dow">${WD.map((w,i)=>`<span class="${isWE(i)?'we':''}">${w[0]}</span>`).join('')}</div>
    <div class="mini-m">${cells}</div>`;
}

/* ====================================================================
   RAIL — week strip (Week mode): 7 days of the selected week
   ==================================================================== */
function buildWeekStrip(){
  const ws=weekStart(), days=[];
  for(let i=0;i<7;i++){const dt=new Date(ws);dt.setDate(ws.getDate()+i);days.push(dt);}
  let rows='';
  days.forEach((dt,i)=>{
    const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate(),k=key(y,m,d);
    const today=(y===TODAY.y&&m===TODAY.m&&d===TODAY.d);
    const seld=(y===sel.y&&m===sel.m&&d===sel.d);
    const c=dayCounts(k);
    const evs=[...c.ev,...c.tent].filter(x=>x.s!=null).sort((a,b)=>a.s-b.s);
    let pips='';
    c.ev.forEach(()=>pips+='<span class="ed"></span>');
    c.tent.forEach(()=>pips+='<span class="ed t"></span>');
    c.task.forEach(()=>pips+='<span class="ed k"></span>');
    const next=evs[0]?`<div class="wsnext"><span class="tm">${fmtH(evs[0].s)}</span>${evs[0].t}</div>`:
      (c.task.length?`<div class="wsnext"><span class="tm">due</span>${c.task[0].t}</div>`:`<div class="wsmore">—</div>`);
    const total=c.ev.length+c.tent.length+c.task.length;
    const more=total>1?`<div class="wsmore">${total} item${total!==1?'s':''}</div>`:'';
    const cls=['wsc',isWE(i)?'we':'',today?'today':'',seld?'sel':''].filter(Boolean).join(' ');
    rows+=`<div class="${cls}" data-y="${y}" data-m="${m}" data-d="${d}">
      <div class="wsd"><div class="dow2">${WD[i]}</div><div class="num">${d}</div></div>
      <div class="wsi"><div class="pips2">${pips||'<span class="wsmore">no items</span>'}</div>${next}${more}</div></div>`;
  });
  const span=`${days[0].getDate()} ${MON[days[0].getMonth()]} – ${days[6].getDate()} ${MON[days[6].getMonth()]}`;
  return `<div class="mtitle"><div class="nav">‹</div><b>${span}</b><div class="nav">›</div><div class="sp"></div></div>
    <div class="wstrip">${rows}</div>`;
}

/* ====================================================================
   HERO — selected-day agenda (Month mode)
   ==================================================================== */
function agendaHTML(){
  const k=key(sel.y,sel.m,sel.d), items=dayItems(k);
  const evs=items.filter(x=>x.type==='ev'||x.type==='tent');
  const tasks=items.filter(x=>x.type==='task');
  const rsvps=items.filter(x=>x.type==='rsvp');
  const i=dow(sel.y,sel.m,sel.d);
  const isToday=(sel.y===TODAY.y&&sel.m===TODAY.m&&sel.d===TODAY.d);
  const full=`${WD[i]} ${sel.d} ${MON[sel.m]}`;
  let html=`<div class="sidehead"><b>${full}</b>${isToday?`<span class="rel">today</span>`:''}</div>
    <div class="sidesub">${evs.length} event${evs.length!==1?'s':''} · ${tasks.length} task${tasks.length!==1?'s':''} due${rsvps.length?` · ${rsvps.length} needs RSVP`:''}</div>`;
  html+=`<div class="eyebrow">Schedule</div>`;
  if(!evs.length)html+=`<div class="empty">No events.</div>`;
  evs.sort((a,b)=>(a.s||0)-(b.s||0)).forEach(e=>{
    const tent=e.type==='tent';
    html+=`<div class="ev ${tent?'tent':''}"><div class="tm">${fmtH(e.s)}</div><div class="body">
      <div class="ti">${e.t} ${tent?'<span class="tag held">held</span>':''}</div>
      ${e.sub?`<small>${e.sub}</small>`:''}
      ${tent?`<div class="approve"><button class="mini-btn primary" title="writes to Google">Approve</button><button class="mini-btn">Dismiss</button></div>`:''}
    </div></div>`;
  });
  if(rsvps.length){
    html+=`<div class="eyebrow">Needs RSVP</div>`;
    rsvps.forEach(r=>{
      html+=`<div class="rsvp"><h4>${r.t} <span class="tag a">external</span></h4>
        <div class="why">${r.sub||'Responding sends an RSVP to the organiser.'} Staged to the Review card before it leaves Artemis.</div>
        <div class="acts"><button class="chip-act">review →</button></div></div>`;
    });
  }
  html+=`<div class="eyebrow">Tasks due</div>`;
  if(!tasks.length)html+=`<div class="empty">Nothing due.</div>`;
  tasks.forEach((t,idx)=>{
    html+=`<div class="task"><div class="chk" data-i="${idx}"><svg viewBox="0 0 24 24"><path d="M5 12l4 4L19 6"/></svg></div>
      <div class="body"><div class="ti">${t.t}</div>${t.sub?`<small>${t.sub}</small>`:''}</div>
      <span class="tag a">due</span></div>`;
  });
  html+=`<div class="addev" title="self-only edit · applied inline"><span class="pl">+</span> add event</div>`;
  return html;
}

/* ====================================================================
   HERO — week-at-a-glance (Week mode): each day's items in one scroll
   ==================================================================== */
function weekGlanceHTML(){
  const ws=weekStart(), days=[];
  for(let i=0;i<7;i++){const dt=new Date(ws);dt.setDate(ws.getDate()+i);days.push(dt);}
  const span=`${days[0].getDate()} ${MON[days[0].getMonth()]} – ${days[6].getDate()} ${MON[days[6].getMonth()]}`;
  let html=`<div class="sidehead"><b>This week</b></div><div class="sidesub">${span} · click a day to focus it</div>`;
  days.forEach((dt,i)=>{
    const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate(),k=key(y,m,d);
    const today=(y===TODAY.y&&m===TODAY.m&&d===TODAY.d);
    const seld=(y===sel.y&&m===sel.m&&d===sel.d);
    const items=dayItems(k);
    const evs=items.filter(x=>x.type==='ev'||x.type==='tent'||x.type==='rsvp').sort((a,b)=>(a.s||0)-(b.s||0));
    const tasks=items.filter(x=>x.type==='task');
    const total=evs.length+tasks.length;
    const hcls=['gd-head',isWE(i)?'we':'',today?'today':'',seld?'sel':''].filter(Boolean).join(' ');
    html+=`<div class="glance-day"><div class="${hcls}" data-y="${y}" data-m="${m}" data-d="${d}">
      <span class="gdw">${WD[i]}</span><span class="gdn">${d} ${MON[m]}</span>
      <span class="gcount">${total?total+' item'+(total!==1?'s':''):'free'}</span></div>`;
    if(!total)html+=`<div class="gd-empty">Nothing scheduled.</div>`;
    evs.forEach(e=>{
      const tent=e.type==='tent';
      html+=`<div class="gline ${tent?'tent':''}"><span class="tm">${fmtH(e.s)}</span><span class="ti">${e.t}</span></div>`;
    });
    tasks.forEach(t=>{
      html+=`<div class="gline task"><span class="tm">due</span><span class="ti">${t.t}</span></div>`;
    });
    html+=`</div>`;
  });
  return html;
}

/* ====================================================================
   render orchestration
   ==================================================================== */
function renderRail(){
  const pane=document.getElementById('railPane');
  pane.innerHTML=(view==='week')?buildWeekStrip():buildMiniMonth();
  wireDays(pane);
}
function renderHero(){
  const pane=document.getElementById('heroPane');
  pane.innerHTML=(view==='week')?weekGlanceHTML():agendaHTML();
  wireDays(pane);                                            // week-glance day headers are clickable
  pane.querySelectorAll('.chk').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
}
function rerender(){renderRail();renderHero();}
function selectDay(y,m,d){sel={y,m,d};rerender();}
function setView(v){
  view=v;
  document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  rerender();
}
function goToday(){selectDay(TODAY.y,TODAY.m,TODAY.d);}

/* ====================================================================
   AMBIENT THEMING (copied verbatim) — 4 seasons × 4 times
   ==================================================================== */
const bg=document.getElementById('bg'), bg2=document.getElementById('bg2');
bg.style.zIndex='1'; bg2.style.zIndex='0';
let _front=bg;
function setPhoto(url,bright){
  const inc=_front===bg?bg2:bg;
  inc.style.transition='none'; inc.style.opacity='0';
  inc.style.backgroundImage=`url(${url})`;
  inc.style.filter=`brightness(${bright}) saturate(1.08) blur(1.5px)`;
  inc.style.zIndex='2'; void inc.offsetWidth;
  inc.style.transition='opacity .8s ease'; inc.style.opacity='1';
  _front.style.zIndex='1'; _front=inc;
}
const SEASONS=['Spring','Summer','Autumn','Winter'], TIMES=['morning','afternoon','evening','night'];
const DIM={morning:.70,afternoon:.80,evening:.60,night:.40};
const PAL={
  'Spring|morning':{bg:'#08120e',p:'#8fecb8',a:'#ffc2a6',v:1}, 'Spring|afternoon':{bg:'#0a1612',p:'#5fee9c',a:'#84d2ff',v:1},
  'Spring|evening':{bg:'#0a0c0d',p:'#f2b487',a:'#93d59a',v:1}, 'Spring|night':{bg:'#05080f',p:'#5aa6d0',a:'#8fd0a8',v:0},
  'Summer|morning':{bg:'#0e0a10',p:'#ff9e6e',a:'#8fb0ff',v:0}, 'Summer|afternoon':{bg:'#11140a',p:'#ffd64a',a:'#58c4f2',v:0},
  'Summer|evening':{bg:'#0d0908',p:'#ff9f4a',a:'#ff5e8a',v:0}, 'Summer|night':{bg:'#06080f',p:'#4f9fc8',a:'#e3a06f',v:0},
  'Autumn|morning':{bg:'#0f0c08',p:'#e3b572',a:'#93b39c',v:1}, 'Autumn|afternoon':{bg:'#100a05',p:'#f0a23f',a:'#c2552b',v:1},
  'Autumn|evening':{bg:'#0d0606',p:'#ff7338',a:'#9a5ab0',v:1}, 'Autumn|night':{bg:'#0a0707',p:'#a06a44',a:'#6a5a7a',v:0},
  'Winter|morning':{bg:'#080d14',p:'#abe0ff',a:'#ffc7a6',v:1}, 'Winter|afternoon':{bg:'#060c14',p:'#58c6ff',a:'#fff0d8',v:1},
  'Winter|evening':{bg:'#07091a',p:'#8aa6ff',a:'#ffb479',v:1}, 'Winter|night':{bg:'#05070e',p:'#5a76b0',a:'#b88a5c',v:0}
};
let amb={season:'Winter',time:'afternoon'};
function setAmbient(season,time){
  amb={season,time}; const c=PAL[season+'|'+time], R=document.documentElement.style;
  R.setProperty('--bg',c.bg); R.setProperty('--p',c.p); R.setProperty('--a',c.a);
  setPhoto(`https://picsum.photos/seed/artemis-${season.toLowerCase()}-${time}/1920/1080`,DIM[time]);
  document.getElementById('ambLabel').textContent=`${season}·${time}`;
  document.querySelectorAll('.amb-cell').forEach(b=>b.classList.toggle('act',b.dataset.s===season&&b.dataset.t===time));
}
(function(){const g=document.getElementById('ambGrid');
  g.innerHTML='<span></span>'+TIMES.map(t=>`<span class="amb-h">${t}</span>`).join('');
  SEASONS.forEach(s=>{g.insertAdjacentHTML('beforeend',`<span class="amb-rh">${s}</span>`);
    TIMES.forEach(t=>{const c=PAL[s+'|'+t];
      g.insertAdjacentHTML('beforeend',`<button class="amb-cell${c.v?'':' draft'}" data-s="${s}" data-t="${t}" title="${s} · ${t}${c.v?'':' · draft'}" style="background:${c.bg}"><i style="background:${c.p}"></i><i style="background:${c.a}"></i></button>`);});});
  g.querySelectorAll('.amb-cell').forEach(b=>b.onclick=()=>setAmbient(b.dataset.s,b.dataset.t));})();
function toggleAmb(){document.getElementById('ambPop').classList.toggle('on');}
function ambNow(){const d=new Date(), m=d.getMonth(), h=d.getHours()+d.getMinutes()/60;
  const season=['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'][m];
  const time=(h>=23.5||h<7.25)?'night':h<12?'morning':h<17?'afternoon':'evening';
  setAmbient(season,time);}
document.addEventListener('click',e=>{const p=document.getElementById('ambPop');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('#ambBtn'))p.classList.remove('on');});
addEventListener('keydown',e=>{if(e.key==='Escape'){const p=document.getElementById('ambPop');if(p.classList.contains('on'))p.classList.remove('on');}});

/* ---------- boot ---------- */
rerender();
setAmbient('Winter','afternoon');
</script>
